topic_id: system_design_youtube
plan_version: 2
status: replanned_after_wiki

source_reading:
  pdf_direct_reading_status: not_applicable
  extraction_needed: false
  notes: "Raw sources are Markdown briefs with public URLs. No local PDFs were present under raw/, so no PDF extraction or source_assets audit is required."

teaching_strategy:
  audience_summary: "System design interview reader aiming for a strong L5 answer, with selective L6+ depth where tradeoffs, operations, and scale boundaries matter."
  explanation_style: "Start from one concrete upload and watch journey, then build requirements, APIs, data model, architecture, bottlenecks, and failure modes. Separate public source claims from plausible interview design choices."
  visual_strategy: "Use architecture, sequence, data-flow, storage-model, cache-path, and failure-mode diagrams. Diagrams should teach one mechanism each and avoid copying source diagrams."
  code_strategy: "Do not force code. Use short API examples, schemas, pseudo-SQL, queue message examples, and capacity arithmetic when they teach better than executable code."

compiled_wiki:
  status: complete
  files:
    - wiki/index.md
    - wiki/source_map.md
    - wiki/requirements_and_scope.md
    - wiki/capacity_and_constraints.md
    - wiki/apis_and_entities.md
    - wiki/architecture_notes.md
    - wiki/operations_and_failure_modes.md
    - wiki/glossary.md
    - wiki/open_questions.md
    - wiki_preview/index.html
  source_assets:
    status: not_applicable
    notes: "No PDF sources were present, so wiki/source_assets/** was not generated."

proposed_wiki_structure:
  - path: wiki/index.md
    purpose: "Bootstrap index for the source-grounded understanding layer and future section planning."
  - path: wiki/source_map.md
    purpose: "Inventory raw files and public URLs; classify each claim as public source grounding, raw brief requirement, or inferred design choice."
  - path: wiki/requirements_and_scope.md
    purpose: "Product scope, non-goals, core user journeys, requirements, and assumptions for a YouTube-like platform."
  - path: wiki/capacity_and_constraints.md
    purpose: "Back-of-the-envelope scale model, read/write patterns, fanout pressure, storage growth, CDN pressure, and cost drivers."
  - path: wiki/apis_and_entities.md
    purpose: "Concrete APIs, entities, identifiers, metadata model, engagement model, and SQL vs NoSQL tradeoff notes."
  - path: wiki/architecture_notes.md
    purpose: "Upload, transcoding, playback, CDN/cache, search, feed/recommendation, counters, comments, subscriptions, abuse/moderation, and analytics architecture notes."
  - path: wiki/operations_and_failure_modes.md
    purpose: "Reliability, observability, SLOs, incident scenarios, degradation paths, and L6+ operational extensions."
  - path: wiki/glossary.md
    purpose: "Beginner-friendly definitions for system design, video, storage, caching, consistency, and observability terms."
  - path: wiki/open_questions.md
    purpose: "Unverified claims, source limitations, design assumptions to label later, and final-section caveats."

reader_facing_sections:
  - id: section_01_foundation
    section_title: "What are we building?"
    reader_question: "What does a YouTube-like platform need to do, and what public facts versus inferred choices are we allowed to use?"
  - id: section_02_requirements_apis_scale
    section_title: "Requirements, APIs, and scale"
    reader_question: "How do we turn a vague video-platform prompt into concrete requirements, APIs, entities, and capacity assumptions?"
  - id: section_03_data_model_storage
    section_title: "Data model and storage choices"
    reader_question: "Which data belongs in metadata stores, object storage, search indexes, event streams, and counters?"
  - id: section_04_upload_transcoding
    section_title: "Upload and transcoding pipeline"
    reader_question: "What happens after a creator uploads a large video, and why is processing asynchronous?"
  - id: section_05_playback_cdn
    section_title: "Playback, CDN, and edge caching"
    reader_question: "How does a viewer get video bytes quickly without overloading origin storage?"
  - id: section_06_discovery_engagement
    section_title: "Search, recommendations, and engagement"
    reader_question: "How do search, feed suggestions, likes, comments, subscriptions, and counters fit around the core video system?"
  - id: section_07_reliability_operations_cost
    section_title: "Reliability, observability, and cost"
    reader_question: "How does the system behave when components fail, queues back up, videos go viral, or cost becomes the bottleneck?"
  - id: section_08_final_architecture
    section_title: "Final architecture and interview recap"
    reader_question: "What is the final coherent design, and how should a candidate summarize it in an interview?"

execution_phases:
  - id: phase_01_source_extraction_and_source_map
    name: "Source extraction and source map"
    goal: "Inventory raw sources and public source claims for a YouTube-like system design, preserving public facts separately from inferred design choices."
    inputs:
      - topic.yaml
      - raw/
      - prompts/audience_profiles.md
      - templates/article_shapes.md
    outputs:
      - wiki/source_map.md
      - wiki/open_questions.md
    instructions:
      - Read the raw brief and source pack.
      - Verify accessible public source pages where possible.
      - Record public facts, source-use limits, and article-specific requirements.
      - Do not modify topic.yaml or raw/.
      - Do not generate lesson prose, visuals, code, preview.html, reviews, or publish files.
    completion_check:
      - wiki/source_map.md lists every raw file and public URL from raw/sources.md.
      - wiki/source_map.md distinguishes public source facts from inferred design choices.
      - wiki/open_questions.md records source limitations and claims that must remain phrased as plausible design choices.

  - id: phase_02_compile_wiki
    name: "Compile wiki"
    goal: "Build the internal source-grounded understanding layer for the system design deep dive."
    inputs:
      - topic.yaml
      - plan.yaml
      - raw/
      - wiki/source_map.md
    outputs:
      - wiki/index.md
      - wiki/requirements_and_scope.md
      - wiki/capacity_and_constraints.md
      - wiki/apis_and_entities.md
      - wiki/architecture_notes.md
      - wiki/operations_and_failure_modes.md
      - wiki/glossary.md
      - wiki/open_questions.md
      - wiki_preview/index.html
    instructions:
      - Compile wiki notes, not final article prose.
      - Keep source claims, raw brief requirements, and inferred system-design decisions visibly separated.
      - Include enough detail for later section planning.
      - Do not modify topic.yaml or raw/.
      - Do not generate lesson prose, section prose, visuals, code, outputs/preview.html, reviews, or publish files.
    completion_check:
      - All listed wiki files exist.
      - Wiki files cover requirements, APIs/entities, architecture, data/storage tradeoffs, workflows, operations, and caveats.
      - wiki_preview/index.html exists or the limitation is recorded in wiki/open_questions.md.

  - id: phase_03_refine_plan_after_wiki
    name: "Refine plan after wiki"
    goal: "Refine plan.yaml into reader-approved section contracts after the compiled wiki exists."
    inputs:
      - topic.yaml
      - plan.yaml
      - wiki/
      - wiki_preview/
    outputs:
      - plan.yaml
    instructions:
      - Preserve completed phases and completed phase ids.
      - Replace broad future phases with explicit reader-facing section phases.
      - Each future section phase must include source coverage, prerequisites, expected visuals/code, scoped output paths, review path, fix log path, and a stop-for-approval instruction.
      - Do not generate lesson content, visuals, code, outputs/preview.html, reviews, or publish files during replanning.
    completion_check:
      - plan.yaml has execution_phases.
      - future reader-facing work is split into small reviewable sections.
      - each future section phase contains section_title, reader_goal, source coverage, prerequisites, concepts, expected visuals/code, output paths, review/fix paths, and approval gate.

  - id: phase_04_create_lesson_outline
    name: "Create lesson outline"
    goal: "Create the skeletal article outline and visual plan after the reader approves this section plan."
    inputs:
      - wiki/
      - topic.yaml
      - plan.yaml
    outputs:
      - outputs/lesson.md
      - outputs/visual_plan.md
    instructions:
      - Do not run until the reader approves the section plan.
      - Create only a modular outline, not full section prose.
      - Include section placeholders matching reader_facing_sections.
      - Include visual slots and source-fidelity reminders.
    completion_check:
      - outputs/lesson.md contains only a skeletal section outline.
      - outputs/visual_plan.md maps intended visuals to the approved sections.

