      - Check source fidelity, technical correctness, visual correctness, explanation quality, section continuity, and preview quality.
    completion_check:
      - reviews/reviewer_report.md exists and covers source fidelity, technical correctness, visual correctness, explanation quality, and preview quality.

  - id: phase_91_final_fixer_loop
    name: "Final fixer loop"
    goal: "Validate final reviewer findings and apply accepted fixes."
    inputs:
      - prompts/fixer.md
      - reviews/reviewer_report.md
      - outputs/
    outputs:
      - reviews/fix_log.md
    instructions:
      - Validate reviewer findings before applying fixes.
      - Do not blindly apply reviewer feedback.
      - Preserve reader-approved section boundaries unless a finding requires a small continuity fix.
    completion_check:
      - reviews/fix_log.md lists accepted, rejected, and partially accepted findings.

  - id: phase_99_publish_pack
    name: "Publish pack"
    goal: "Create a Jekyll-ready publish package after final audit and fixes are complete."
    inputs:
      - prompts/publish_pack.md
      - outputs/
      - reviews/
      - topic.yaml
    outputs:
      - outputs/publish/
    instructions:
      - Do not actually publish anything.
      - Use topic.yaml publish_target front matter and asset path settings.
      - Keep public facts and inferred choices clearly separated in publish output.
    completion_check:
      - outputs/publish/blog.md is copy-pasteable into the configured Jekyll target.
