section_order:
  - section_id: section_01_foundation
    title: "What are we building?"
    reason_for_position: "Starts with scope, source boundaries, and concrete creator/viewer journeys before components."
  - section_id: section_02_requirements_apis_scale
    title: "Requirements, APIs, and scale"
    reason_for_position: "Turns the prompt into measurable requirements and request shapes before storage or architecture choices."
  - section_id: section_03_data_model_storage
    title: "Data model and storage choices"
    reason_for_position: "Defines state and storage boundaries before walking through write/read pipelines."
  - section_id: section_04_upload_transcoding
    title: "Upload and transcoding pipeline"
    reason_for_position: "Covers the hardest write path after entities, APIs, and storage are established."
  - section_id: section_05_playback_cdn
    title: "Playback, CDN, and edge caching"
    reason_for_position: "Covers the dominant read path after processed media artifacts exist."
  - section_id: section_06_discovery_engagement
    title: "Search, recommendations, and engagement"
    reason_for_position: "Adds product subsystems around the core video path without letting them dominate the article."
  - section_id: section_07_reliability_operations_cost
    title: "Reliability, observability, and cost"
    reason_for_position: "Deepens the design once all major workflows and bottlenecks are visible."
  - section_id: section_08_final_architecture
    title: "Final architecture and interview recap"
    reason_for_position: "Synthesizes the design and gives a concise interview-ready answer after all mechanisms are introduced."
authoring_order_notes: "Author sections in order. Each section should be reviewed, fixed, and approved before the next begins."
