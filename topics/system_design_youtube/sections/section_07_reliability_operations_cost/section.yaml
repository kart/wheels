section_id: section_07_reliability_operations_cost
title: "Reliability, observability, and cost"
status: planned
learning_goal: "Plan SLOs, metrics, failure modes, degradation strategies, multi-region boundaries, and cost controls."
reader_outcome: "Reader can reason about the system under stress and explain senior tradeoffs without adding random components."
source_anchors:
  - source: topics/system_design_youtube/wiki/operations_and_failure_modes.md
    relevant_claims:
      - "Watch path usually deserves the highest availability target."
      - "Failure modes include upload interruption, transcode backlog, hot shards, cache miss storms, index lag, counter delay, spam surge, and region outage."
      - "Cost domains include storage, transcoding, CDN egress, metadata, search, and analytics."
  - source: topics/system_design_youtube/wiki/capacity_and_constraints.md
    relevant_claims:
      - "Capacity model should connect to storage, transcode, CDN, metadata, search, and analytics cost domains."
