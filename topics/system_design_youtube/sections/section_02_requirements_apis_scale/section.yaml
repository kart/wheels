section_id: section_02_requirements_apis_scale
title: "Requirements, APIs, and scale"
status: planned
learning_goal: "Convert product scope into requirements, API boundaries, core entities, and labeled capacity assumptions."
reader_outcome: "Reader can state what the system must do, sketch APIs, and explain the scale model without presenting assumptions as facts."
source_anchors:
  - source: topics/system_design_youtube/wiki/requirements_and_scope.md
    relevant_claims:
      - "Functional and nonfunctional requirements are enumerated."
      - "Upload completion is distinct from playback availability."
  - source: topics/system_design_youtube/wiki/capacity_and_constraints.md
    relevant_claims:
      - "Capacity estimates should be labeled as assumptions."
      - "Public YouTube blog provides the 500 hours/minute upload anchor."
  - source: topics/system_design_youtube/wiki/apis_and_entities.md
    relevant_claims:
      - "Candidate APIs include upload sessions, complete upload, metadata, playback, engagement, subscriptions, feed, and search."
source_assets:
  formulas: []
  figures: []
  tables: []
  pages: []
visual_verification_required: []
prerequisite_concepts:
  - section_01 source boundary
  - functional requirement
  - nonfunctional requirement
  - API
prerequisite_ladder:
  assumed_concepts:
    - client/server request
  concepts_introduced_here:
    - API boundary
    - entity
    - capacity estimate
    - read/write ratio
    - assumption versus public fact
  concrete_mental_model: "A small product spec becomes endpoints, entities, and estimated workload."
  tiny_example: "Estimate storage for 10 uploads before scaling the arithmetic to millions."
terms_that_must_be_introduced_before_use:
  - entity
  - upload session
  - manifest API
  - read/write ratio
  - QPS
  - capacity assumption
term_introduction_strategy:
  immediate_plain_english:
    - entity
    - upload session
    - capacity assumption
  tiny_example_needed:
    - read/write ratio
    - storage estimate
  already_established_in:
    - section_01_foundation
  can_be_used_lightly:
    - API
  defer_formal_definition_until:
    - shard
    - CDN
notation_introduction_order:
  - uploads_per_day
  - average_original_size
  - rendition_multiplier
intuition_before_notation_notes: "Explain estimates as rough sizing before showing multiplication."
depends_on_sections:
  - section_01_foundation
authoring_order_notes: "Author after source boundary is established."
key_questions_to_answer:
  - "Which requirements are in scope?"
  - "What are the core APIs and entities?"
  - "Which numbers are assumptions?"
  - "What bottlenecks do the estimates reveal?"
core_mechanism:
  type: table
  why_this_mechanism: "Requirements and estimates are easiest to review in compact tables."
media_needed:
  - type: requirements_table
    purpose: "Map product requirements to design mechanisms."
    preferred_generation_method: hand_svg
    suggested_tool: plain_svg
    visual_source_expected: true
    rendered_outputs_expected:
      - svg
      - png
    source_assets_used: []
    review_requirements:
      - rendered_visual_check
      - no_clipping
      - caption_matches_visual
  - type: capacity_table
    purpose: "Show assumption-driven storage and traffic estimates."
    preferred_generation_method: code_generated
    suggested_tool: matplotlib
    visual_source_expected: true
    rendered_outputs_expected:
      - svg
      - png
    source_assets_used: []
    review_requirements:
      - rendered_visual_check
      - no_misleading_implication
      - caption_matches_visual
code_needed:
  required: false
  why: "HTTP examples and arithmetic snippets are enough; runnable code is unnecessary."
  artifact_type: http_examples_and_arithmetic
toy_or_scaled_down_demo:
  description: "10 uploads/day and 100 watches/day, then scale to an interview assumption set."
  what_it_demonstrates: "Read-heavy workload and storage multiplication."
  what_it_omits: "Exact YouTube traffic."
toy_to_real_bridge: "Explicitly say toy numbers reveal shape; round-number assumptions provide interview capacity practice."
expected_reader_confusions:
  - "Believing round numbers are sourced."
  - "Listing APIs without explaining state changes."
section_specific_review_checks:
  - "All exact-looking capacity numbers are labeled as assumptions unless sourced."
  - "API examples explain durable state and consistency expectation."
completion_criteria:
  - "Requirements table, API examples, core entities, and capacity model are planned."
  - "The section sets up storage decisions in section 03."
user_review_gate:
  required: true
  instruction: "Stop after this section is authored/reviewed/fixed and wait for user approval before continuing."
design_questions:
  - question: "What are the functional and nonfunctional requirements?"
  - question: "What APIs expose the core workflows?"
  - question: "What workload shape drives the design?"
requirements_covered:
  functional:
    - upload
    - watch
    - search
    - engagement
    - subscriptions
    - feed
  non_functional:
    - availability
    - durability
    - latency
    - scalability
    - cost awareness
design_decisions:
  - decision: "Use upload sessions instead of a single blocking upload API."
    options_considered:
      - "single POST video endpoint"
      - "resumable upload session"
    chosen_option: "resumable upload session"
    reason: "Large files and network interruptions need durable resumability."
    tradeoffs: "More state management, better reliability."
    l6_plus_extension: "Discuss upload session expiration, abuse limits, and regional ingest placement only if useful."
apis_to_design:
  - name: "Create upload session"
    purpose: "Allocate upload intent and durable video id."
    request_shape: "channel_id, filename, content_type, content_length, checksum, visibility"
    response_shape: "upload_session_id, upload_url, expires_at, video_id"
    consistency_expectation: "strong enough to avoid duplicate video ids"
    failure_cases:
      - "invalid auth"
      - "quota exceeded"
      - "expired session"
  - name: "Playback manifest"
    purpose: "Return playable rendition manifest metadata."
    request_shape: "video_id plus viewer context"
    response_shape: "manifest_url, available_renditions, policy fields"
    consistency_expectation: "must respect visibility and readiness"
    failure_cases:
      - "video not ready"
      - "not authorized"
data_model:
  entities:
    - User
    - Channel
    - Video
    - Rendition
    - Manifest
    - Engagement action
  storage_choice: "Deferred to section 03."
  sql_vs_nosql_reasoning: "Mention only as coming next."
  indexes: []
  partitioning_key: []
  consistency_model: "Strong for identity and publication state; looser for counters."
  l6_plus_extension: "Capacity estimates can drive API limits and quota policy."
workflows: []
diagrams_needed:
  - type: data_model
    purpose: "Core entities overview."
    preferred_generation_method: code_generated
    suggested_tool: graphviz
scale_and_capacity:
  assumptions:
    - "Use round-number interview assumptions."
  bottlenecks:
    - "media storage"
    - "transcoding compute"
    - "playback bandwidth"
  scaling_strategy: "Use estimates to motivate separate media, metadata, and async processing paths."
  l6_plus_extension: "Connect each capacity number to a cost domain."
failure_modes: []
observability:
  metrics: []
  logs: []
  traces: []
  alerts: []
  slos: []
source_grounding:
  known_public_facts:
    - "YouTube blog says more than 500 hours are uploaded per minute on average."
  inferred_design_choices:
    - "API shapes and entity fields."
    - "Round-number capacity assumptions."
  sources_to_consult:
    - topics/system_design_youtube/wiki/capacity_and_constraints.md
    - topics/system_design_youtube/wiki/apis_and_entities.md
l6_plus_callouts:
  - topic: "Capacity model as cost model"
    why_it_matters: "Senior answers connect scale estimates to bottlenecks and cost."
    where_to_include: "After capacity table."
