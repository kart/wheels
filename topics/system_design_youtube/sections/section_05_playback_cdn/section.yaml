section_id: section_05_playback_cdn
title: "Playback, CDN, and edge caching"
status: planned
learning_goal: "Trace a viewer request through metadata, playback manifest, CDN cache hit/miss, origin, and watch-event emission."
reader_outcome: "Reader can explain how media delivery avoids overloading origin and why CDN behavior changes latency, cost, and failure modes."
source_anchors:
  - source: topics/system_design_youtube/wiki/architecture_notes.md
    relevant_claims:
      - "Playback service checks readiness/policy, returns a manifest, and player fetches chunks through CDN/cache."
  - source: topics/system_design_youtube/wiki/source_map.md
    relevant_claims:
      - "Google Global Cache allows ISPs to serve some Google content from within their networks and reduces transit/peering traffic."
      - "The 70-90% cacheable traffic claim is GGC-specific and must not be generalized."
  - source: topics/system_design_youtube/wiki/glossary.md
    relevant_claims:
      - "Definitions exist for CDN, edge cache, cache hit, cache miss, origin, manifest, and adaptive bitrate."
source_assets:
  formulas: []
  figures: []
  tables: []
  pages: []
visual_verification_required: []
prerequisite_concepts:
  - section_04 manifests and renditions
  - metadata read
  - object storage
prerequisite_ladder:
  assumed_concepts:
    - manifest
    - rendition
    - object storage
  concepts_introduced_here:
    - CDN
    - edge cache
    - cache hit
    - cache miss
    - origin
    - adaptive bitrate
  concrete_mental_model: "A player asks for a manifest, then repeatedly asks for video chunks."
  tiny_example: "A popular 720p chunk is served from edge cache; a new chunk misses and is fetched from origin."
terms_that_must_be_introduced_before_use:
  - CDN
  - edge cache
  - origin
  - cache hit
  - cache miss
  - adaptive bitrate
  - signed URL
term_introduction_strategy:
  immediate_plain_english:
    - CDN
    - edge cache
    - origin
    - cache hit
    - cache miss
  tiny_example_needed:
    - cache miss storm
    - adaptive bitrate
  already_established_in:
    - section_04_upload_transcoding
  can_be_used_lightly:
    - manifest
    - rendition
  defer_formal_definition_until:
    - origin shielding
notation_introduction_order: []
intuition_before_notation_notes: "Use cache-hit/cache-miss paths before any cache ratio discussion."
depends_on_sections:
  - section_03_data_model_storage
  - section_04_upload_transcoding
authoring_order_notes: "Playback should come after upload/transcoding so manifests and chunks already make sense."
key_questions_to_answer:
  - "What happens when a viewer presses play?"
  - "What does the CDN serve?"
  - "What changes on cache hit versus miss?"
  - "How do watch events flow back into the system?"
core_mechanism:
  type: sequence_diagram
  why_this_mechanism: "Playback is a request path with a critical branch at cache hit/miss."
media_needed:
  - type: cache_flow
    purpose: "Compare cache hit and cache miss request paths."
    preferred_generation_method: code_generated
    suggested_tool: graphviz
    visual_source_expected: true
    rendered_outputs_expected:
      - svg
      - png
    source_assets_used: []
    review_requirements:
      - rendered_visual_check
      - no_clipping
      - no_misleading_implication
      - caption_matches_visual
  - type: sequence_diagram
    purpose: "Show metadata, manifest, media chunks, and watch event emission."
    preferred_generation_method: mermaid
    suggested_tool: mermaid
    visual_source_expected: true
    rendered_outputs_expected:
      - svg
      - png
    source_assets_used: []
    review_requirements:
      - rendered_visual_check
      - caption_matches_visual
code_needed:
  required: false
  why: "A cache flow diagram teaches the mechanism better than runnable code."
  artifact_type: none
toy_or_scaled_down_demo:
  description: "One viewer requests a manifest and three chunks; two hit edge cache and one misses."
  what_it_demonstrates: "Cache hit/miss behavior and origin load."
  what_it_omits: "Real routing, peering, eviction, and CDN control-plane details."
toy_to_real_bridge: "Bridge from one chunk miss to viral videos, origin shielding, cache prewarming, and egress cost."
expected_reader_confusions:
  - "Thinking the metadata service streams video bytes."
  - "Treating GGC cache-hit numbers as generic CDN guarantees."
section_specific_review_checks:
  - "GGC claims are phrased as public Google facts only."
  - "Cache miss path is not hand-waved."
completion_criteria:
  - "Playback path, cache hit path, cache miss path, and watch event are all clear."
  - "CDN tradeoffs include latency, origin load, failure, and cost."
user_review_gate:
  required: true
  instruction: "Stop after this section is authored/reviewed/fixed and wait for user approval before continuing."
design_questions:
  - question: "How do viewers get media chunks without going through app servers?"
  - question: "What happens on a cache miss?"
  - question: "How should hot videos be handled?"
requirements_covered:
  functional:
    - watch videos
    - emit watch events
  non_functional:
    - low startup latency
    - high availability
    - origin protection
    - cost control
design_decisions:
  - decision: "Serve media chunks through CDN/edge cache."
    options_considered:
      - "serve media from app servers"
      - "serve from origin object storage only"
      - "serve through CDN/edge cache"
    chosen_option: "serve through CDN/edge cache"
    reason: "Video bytes dominate traffic and should be close to viewers."
    tradeoffs: "Cache invalidation, routing, and observability complexity."
    l6_plus_extension: "Discuss regional cache placement and origin shielding."
apis_to_design:
  - name: "Playback manifest"
    purpose: "Authorize playback and return manifest/chunk metadata."
    request_shape: "video_id, viewer context"
    response_shape: "manifest_url, available_renditions, policy"
    consistency_expectation: "must reflect readiness and privacy"
    failure_cases:
      - "video unavailable"
      - "not authorized"
      - "manifest generation failed"
data_model:
  entities:
    - Video
    - Manifest
    - Rendition
    - WatchEvent
  storage_choice:
    - "manifest/chunks in object storage and CDN"
    - "watch events in event stream"
  sql_vs_nosql_reasoning: "Metadata authorization may use SQL-like store; chunk serving is object/CDN path."
  indexes:
    - "video_id to active manifest"
  partitioning_key:
    - video_id
  consistency_model: "Strong for privacy/readiness; eventual for watch events and counters."
  l6_plus_extension: "Deletion/privacy must invalidate or expire cached media safely."
workflows:
  - name: "Playback request"
    steps:
      - "Fetch video metadata"
      - "Check visibility/readiness"
      - "Return manifest"
      - "Fetch chunks from edge cache"
      - "Fetch from origin on miss"
      - "Emit watch event"
    sync_or_async: "sync for playback, async for watch events"
    failure_modes:
      - "manifest unavailable"
      - "cache miss storm"
      - "origin overload"
    retry_idempotency_notes: "Watch events need deduplication; media chunk retries should be safe."
diagrams_needed:
  - type: cache_flow
    purpose: "Show hit/miss paths."
    preferred_generation_method: code_generated
    suggested_tool: graphviz
scale_and_capacity:
  assumptions:
    - "Popular videos create skewed traffic."
  bottlenecks:
    - "origin egress"
    - "CDN miss rate"
    - "playback startup latency"
  scaling_strategy: "Cache popular chunks, use origin shielding, and keep media bytes off app servers."
  l6_plus_extension: "Cache placement affects cost, latency, and incident blast radius."
failure_modes:
  - failure: "CDN cache miss storm"
    mitigation: "origin shielding, request collapsing, and prewarming"
    detection: "drop in cache hit ratio and rise in origin egress"
    l6_plus_extension: "Hot-video prediction can prioritize prewarming."
observability:
  metrics:
    - "manifest latency"
    - "playback error rate"
    - "cache hit ratio"
    - "origin egress"
  logs:
    - "manifest authorization decisions"
  traces:
    - "playback request trace"
  alerts:
    - "cache hit ratio drop"
    - "origin egress spike"
  slos:
    - "playback startup time"
source_grounding:
  known_public_facts:
    - "GGC allows ISPs to serve some Google content within their networks."
    - "GGC docs report 70-90% of cacheable traffic in typical cases, varying by operator."
  inferred_design_choices:
    - "Specific CDN topology, cache policy, and origin shielding design."
  sources_to_consult:
    - topics/system_design_youtube/wiki/source_map.md
l6_plus_callouts:
  - topic: "Cache placement and origin shielding"
    why_it_matters: "This is where CDN design becomes cost and failure-domain design."
    where_to_include: "After cache hit/miss flow."
