section_id: section_04_upload_transcoding
title: "Upload and transcoding pipeline"
status: planned
learning_goal: "Trace a creator upload through durable ingest, async processing, transcoding, manifest generation, and publication state."
reader_outcome: "Reader can explain why upload is async, what state changes, and how processing failures are handled."
source_anchors:
  - source: topics/system_design_youtube/wiki/architecture_notes.md
    relevant_claims:
      - "Upload pipeline stores original, emits VideoUploaded, runs validation/transcoding/thumbnail/manifest jobs."
      - "Processing state transitions include UPLOADING/DRAFT, PROCESSING, READY, PUBLISHED, FAILED."
  - source: topics/system_design_youtube/wiki/source_map.md
    relevant_claims:
      - "YouTube public sources ground transcoding cost, multiple devices/resolutions, VCU, and 20-33x efficiency claim."
  - source: topics/system_design_youtube/wiki/capacity_and_constraints.md
    relevant_claims:
      - "Transcoding is compute-intensive and backlog-prone."
source_assets:
  formulas: []
  figures: []
  tables: []
  pages: []
visual_verification_required: []
prerequisite_concepts:
  - section_03 storage domains
  - object storage
  - metadata state
  - queue
prerequisite_ladder:
