      - caption_matches_visual
code_needed:
  required: false
  why: "A queue message shape may clarify the event contract; runnable code is not needed."
  artifact_type: queue_message_example
toy_or_scaled_down_demo:
  description: "One uploaded file generates three rendition jobs."
  what_it_demonstrates: "Async fanout and manifest readiness."
  what_it_omits: "Full codec ladder, fleet scheduling, and VCU internals."
toy_to_real_bridge: "Bridge from three jobs to backlog management, priority queues, accelerator cost, and partial availability."
expected_reader_confusions:
  - "Thinking the upload request waits for all transcoding."
  - "Thinking VCU details imply the full internal YouTube scheduler."
section_specific_review_checks:
  - "VCU and efficiency claims are explicitly public-source claims."
  - "Exact queue topology is labeled as plausible design."
completion_criteria:
  - "Sync/async boundary and state transitions are clear."
  - "Failure modes and idempotency are included."
user_review_gate:
  required: true
  instruction: "Stop after this section is authored/reviewed/fixed and wait for user approval before continuing."
design_questions:
  - question: "Where should the upload path become asynchronous?"
  - question: "How should the system handle transcode backlog and partial failures?"
requirements_covered:
  functional:
    - upload videos
    - process videos into renditions
    - publish when ready
  non_functional:
    - durability
    - backpressure
    - cost-aware processing
design_decisions:
  - decision: "Return processing state after durable upload instead of waiting for transcoding."
    options_considered:
      - "synchronous upload plus transcode"
      - "durable upload plus async processing"
    chosen_option: "durable upload plus async processing"
    reason: "Transcoding is slow and compute-intensive."
    tradeoffs: "User sees processing delay; system gains reliability and control."
    l6_plus_extension: "Prioritize processing by creator tier, video popularity prediction, or queue age."
apis_to_design:
  - name: "Complete upload"
    purpose: "Verify object and enqueue processing."
    request_shape: "upload_session_id"
    response_shape: "video_id, processing_state"
    consistency_expectation: "idempotent completion"
    failure_cases:
      - "checksum mismatch"
      - "expired upload"
      - "duplicate completion"
data_model:
  entities:
    - Video
    - Rendition
    - Manifest
    - ProcessingJob
  storage_choice:
    - "original and renditions in object storage"
    - "video state in metadata store"
    - "jobs in queue"
  sql_vs_nosql_reasoning: "State transitions benefit from a transactional metadata store; high-volume job execution uses queues."
  indexes:
    - "video_id"
    - "processing_state plus updated_at"
  partitioning_key:
    - video_id
  consistency_model: "Strong for state transitions; eventual for derived renditions becoming available."
  l6_plus_extension: "State machine should support reprocessing after codec ladder changes."
workflows:
  - name: "Upload and processing"
    steps:
      - "Create upload session"
      - "Upload original"
      - "Complete upload"
      - "Verify object"
      - "Emit processing event"
      - "Run transcode jobs"
      - "Generate manifest"
      - "Publish or fail"
    sync_or_async: "sync until durable receipt, async for processing"
    failure_modes:
      - "duplicate completion"
      - "worker crash"
      - "rendition failure"
    retry_idempotency_notes: "Use upload_session_id, video_id, and job ids to make retries safe."
diagrams_needed:
  - type: sequence
    purpose: "Upload/transcoding sync-async flow."
    preferred_generation_method: mermaid
    suggested_tool: mermaid
scale_and_capacity:
  assumptions:
    - "Upload volume and rendition multiplier are assumption-driven."
  bottlenecks:
    - "transcoding compute"
    - "queue backlog"
    - "object storage write throughput"
  scaling_strategy: "Partition queues/workers, autoscale processing, prioritize jobs, and publish lower renditions first if needed."
  l6_plus_extension: "Hardware/software co-design and accelerator fleets affect throughput, failure domains, and cost."
failure_modes:
  - failure: "Transcoding backlog"
    mitigation: "priority queues and limited rendition policy"
    detection: "oldest queue message age"
    l6_plus_extension: "Backpressure policy is a product and cost decision."
observability:
  metrics:
    - "upload completion rate"
    - "queue depth"
    - "oldest message age"
    - "transcode duration by rendition"
  logs:
    - "video state transition logs"
  traces:
    - "upload complete to enqueue"
  alerts:
    - "backlog age breach"
  slos:
    - "time to first playable rendition"
source_grounding:
  known_public_facts:
    - "YouTube sources state uploaded video must be prepared for devices/resolutions."
    - "Public sources report VCU and 20-33x efficiency over prior baseline."
  inferred_design_choices:
    - "Queue topology, job state, and publication policy."
  sources_to_consult:
    - topics/system_design_youtube/wiki/source_map.md
l6_plus_callouts:
  - topic: "Backpressure and processing priority"
    why_it_matters: "It converts infrastructure saturation into a product policy."
    where_to_include: "After transcode backlog explanation."
