  - section_03_data_model_storage
authoring_order_notes: "This is the first deep workflow section; keep it self-contained."
key_questions_to_answer:
  - "What happens before the upload API responds?"
  - "What happens later in the background?"
  - "How do retries avoid duplicate jobs?"
  - "What public transcoding facts can we cite?"
core_mechanism:
  type: sequence_diagram
  why_this_mechanism: "The sync/async boundary is the central idea."
media_needed:
  - type: sequence_diagram
    purpose: "Show client, upload service, object storage, metadata DB, queue, workers, and manifest generation."
    preferred_generation_method: mermaid
