section_id: section_03_data_model_storage
title: "Data model and storage choices"
status: planned
learning_goal: "Plan how metadata, media blobs, search indexes, event streams, and counters fit into separate storage domains."
reader_outcome: "Reader can defend storage choices by access pattern instead of saying 'NoSQL because scale'."
source_anchors:
  - source: topics/system_design_youtube/wiki/apis_and_entities.md
    relevant_claims:
      - "Metadata, object storage, search index, and analytics/event stream serve different access patterns."
      - "Candidate shard keys include video_id, channel_id, user_id, and time buckets."
  - source: topics/system_design_youtube/wiki/source_map.md
    relevant_claims:
      - "Vitess public docs ground sharded SQL and proxy routing, not current YouTube schema."
  - source: topics/system_design_youtube/wiki/glossary.md
    relevant_claims:
      - "Definitions exist for metadata, object storage, sharding, read replica, consistency, VTGate, and VTTablet."
