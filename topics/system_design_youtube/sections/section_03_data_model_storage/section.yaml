scale_and_capacity:
  assumptions:
    - "Metadata QPS is high but payloads are small."
    - "Media bytes dominate storage and bandwidth."
  bottlenecks:
    - "hot video rows"
    - "large object reads"
    - "search index freshness"
  scaling_strategy: "Shard metadata, cache reads, store media in object storage, and derive indexes/events asynchronously."
  l6_plus_extension: "Separate logical data ownership from physical storage implementation."
failure_modes:
  - failure: "Search index lag"
    mitigation: "Primary metadata remains source of truth; replay events."
    detection: "Indexing lag metric."
    l6_plus_extension: "Use tombstones for privacy/deletion propagation."
observability:
