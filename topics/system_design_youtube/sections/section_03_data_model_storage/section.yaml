  - "Shard keys and consistency boundaries are explained."
user_review_gate:
  required: true
  instruction: "Stop after this section is authored/reviewed/fixed and wait for user approval before continuing."
design_questions:
  - question: "What data must be strongly consistent?"
  - question: "What data can be derived asynchronously?"
  - question: "How does sharded SQL compare with NoSQL for metadata?"
requirements_covered:
  functional:
    - metadata storage
    - media storage
    - search
    - engagement state
  non_functional:
    - scalable reads
    - durable storage
    - consistency boundaries
design_decisions:
  - decision: "Separate media bytes from metadata."
    options_considered:
      - "store everything in a database"
      - "store media in object storage and metadata in queryable stores"
    chosen_option: "separate media and metadata"
    reason: "Large blobs and small queryable records have different access patterns."
    tradeoffs: "Requires pointers and lifecycle coordination."
    l6_plus_extension: "Discuss garbage collection for orphaned blobs and deletion guarantees."
  - decision: "Use sharded SQL as a plausible metadata tier option."
    options_considered:
      - "single SQL database"
      - "sharded SQL with proxy"
      - "NoSQL primary store"
    chosen_option: "sharded SQL option, not mandatory"
    reason: "Public Vitess docs show scalable SQL can be viable for YouTube-era metadata scaling."
    tradeoffs: "Maintains SQL semantics but adds sharding operations."
    l6_plus_extension: "Discuss resharding and query routing as platform concerns."
apis_to_design: []
data_model:
  entities:
    - User
    - Channel
    - Video
    - Rendition
    - Manifest
    - Comment
    - Subscription
    - EngagementAction
    - WatchEvent
  storage_choice:
    - "metadata: sharded SQL or similar strongly queryable store"
    - "media: object storage"
    - "search: search index"
    - "events: stream/analytics store"
    - "counters: aggregated store"
  sql_vs_nosql_reasoning: "Choose by access pattern, consistency, indexing, transactions, and operational maturity."
  indexes:
    - "video_id primary lookup"
    - "channel_id plus publish_time"
    - "user_id plus subscription/channel"
    - "search inverted indexes"
  partitioning_key:
    - video_id
    - channel_id
    - user_id
    - time_bucket plus video_id
  consistency_model: "Strong for ownership/privacy/publication state; eventual for search, counters, and analytics."
  l6_plus_extension: "Privacy deletion requires coordinated removal from primary, derived indexes, caches, and analytics."
