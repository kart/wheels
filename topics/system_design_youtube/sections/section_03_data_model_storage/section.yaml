toy_to_real_bridge: "After the toy row/object/index, explain hot partitions, sharding, replica reads, and delayed derived data."
expected_reader_confusions:
  - "Thinking object storage can answer metadata queries."
  - "Thinking SQL cannot scale."
  - "Thinking search index is the source of truth."
section_specific_review_checks:
  - "Vitess claims are limited to public documentation."
  - "SQL vs NoSQL reasoning names query, consistency, and operational tradeoffs."
completion_criteria:
