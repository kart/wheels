section_id: section_06_discovery_engagement
title: "Search, recommendations, and engagement"
status: planned
learning_goal: "Plan how search, feed suggestions, likes, comments, subscriptions, counters, and moderation hooks connect to the core video platform."
reader_outcome: "Reader can describe secondary systems at interview depth without inventing ranking internals."
source_anchors:
  - source: topics/system_design_youtube/wiki/architecture_notes.md
    relevant_claims:
      - "Search indexing is event-driven and eventually consistent."
      - "Recommendations/feed should stay high-level."
      - "Likes/comments/subscriptions and counters have separate write/read concerns."
  - source: topics/system_design_youtube/wiki/open_questions.md
    relevant_claims:
      - "Avoid inventing exact recommendation features or model weights."
      - "View count is not a simple synchronous increment at high scale."
source_assets:
  formulas: []
  figures: []
  tables: []
  pages: []
visual_verification_required: []
prerequisite_concepts:
  - section_03 storage domains
  - section_05 watch events
  - event stream
prerequisite_ladder:
  assumed_concepts:
    - event stream
    - search index
    - watch event
  concepts_introduced_here:
    - candidate generation
    - ranking service
    - aggregation
    - deduplication
    - moderation hook
  concrete_mental_model: "One published video updates search; one watch updates counters and feed signals later."
  tiny_example: "A viewer likes a video and posts a comment; their UI updates quickly, while aggregate counters lag."
terms_that_must_be_introduced_before_use:
  - search index
  - candidate generation
  - ranking
  - aggregation
  - deduplication
  - moderation hook
term_introduction_strategy:
  immediate_plain_english:
    - candidate generation
    - aggregation
    - moderation hook
  tiny_example_needed:
    - deduplication
    - eventual counter
  already_established_in:
    - section_03_data_model_storage
    - section_05_playback_cdn
  can_be_used_lightly:
    - event stream
    - search index
  defer_formal_definition_until:
    - ML ranking internals
notation_introduction_order: []
intuition_before_notation_notes: "Use pipelines and tables, not formulas or model descriptions."
depends_on_sections:
  - section_03_data_model_storage
  - section_05_playback_cdn
authoring_order_notes: "Keep this bounded; it is a supporting subsystem section."
key_questions_to_answer:
  - "How does a video become searchable?"
  - "What should recommendation coverage include and exclude?"
  - "Why do counters lag?"
  - "Where do abuse/moderation hooks fit?"
core_mechanism:
  type: visual_trace
  why_this_mechanism: "Event-driven flows make derived systems and eventual consistency concrete."
media_needed:
  - type: pipeline
    purpose: "Show metadata publish event to search index."
    preferred_generation_method: code_generated
    suggested_tool: graphviz
    visual_source_expected: true
    rendered_outputs_expected:
      - svg
      - png
    source_assets_used: []
    review_requirements:
      - rendered_visual_check
      - no_clipping
      - caption_matches_visual
  - type: pipeline
    purpose: "Show watch/like/subscription events to feed candidates, counters, and abuse signals."
    preferred_generation_method: code_generated
    suggested_tool: graphviz
    visual_source_expected: true
    rendered_outputs_expected:
      - svg
      - png
    source_assets_used: []
    review_requirements:
      - rendered_visual_check
      - no_misleading_implication
      - caption_matches_visual
code_needed:
  required: false
  why: "Pipelines and event examples are clearer than runnable code."
  artifact_type: event_schema_examples
toy_or_scaled_down_demo:
  description: "One publish event updates search; three watch events become one deduplicated view count update."
  what_it_demonstrates: "Derived systems are asynchronous and may lag."
  what_it_omits: "Full ML ranking and abuse classifier internals."
toy_to_real_bridge: "Scale from one event to high-volume streams, delayed aggregation, replay, and freshness SLOs."
expected_reader_confusions:
  - "Letting recommendation ML consume the entire system design."
  - "Thinking view counts should synchronously update a hot video row."
section_specific_review_checks:
  - "No invented recommendation model internals."
  - "Counters include buffering, deduplication, and delayed aggregation."
completion_criteria:
  - "Search, feed, engagement, counters, subscriptions, comments, and moderation hooks are covered at bounded depth."
user_review_gate:
  required: true
  instruction: "Stop after this section is authored/reviewed/fixed and wait for user approval before continuing."
design_questions:
  - question: "Which systems are source-of-truth and which are derived?"
  - question: "How fresh do search, feed, and counters need to be?"
requirements_covered:
  functional:
    - search
    - recommendations/feed
    - likes/dislikes
    - comments
    - subscriptions
    - view counts
    - moderation hooks
  non_functional:
    - freshness
    - high write volume
    - abuse resistance
design_decisions:
  - decision: "Use async events for search indexing and counters."
    options_considered:
      - "synchronous writes to every derived system"
      - "event-driven derived systems"
    chosen_option: "event-driven derived systems"
    reason: "Derived systems have different latency, throughput, and storage needs."
    tradeoffs: "Eventual consistency and replay complexity."
    l6_plus_extension: "Discuss replay, deduplication keys, and late events."
apis_to_design:
  - name: "Like video"
    purpose: "Record actor action and update derived aggregate later."
    request_shape: "video_id, actor user_id"
    response_shape: "actor action state"
    consistency_expectation: "read-your-write for actor; aggregate count may lag"
    failure_cases:
      - "duplicate request"
      - "video unavailable"
  - name: "Search"
    purpose: "Retrieve matching public videos from search index."
    request_shape: "query, filters, pagination"
    response_shape: "ranked video summaries"
    consistency_expectation: "eventually consistent with metadata"
    failure_cases:
      - "index lag"
      - "privacy filter mismatch"
data_model:
  entities:
    - SearchDocument
    - WatchEvent
    - LikeAction
    - Comment
    - Subscription
    - FeedCandidate
  storage_choice:
    - "search index for query"
    - "event stream for watch/engagement"
    - "metadata/action store for idempotent user actions"
    - "aggregate store for counters"
  sql_vs_nosql_reasoning: "User action state may need keyed consistency; events/counters optimize high-volume writes."
  indexes:
    - "text fields"
    - "user_id plus channel_id"
    - "video_id plus time_bucket"
  partitioning_key:
    - video_id
    - user_id
    - time_bucket
  consistency_model: "Eventual for search/feed/counters; stronger for actor action state and moderation decisions."
  l6_plus_extension: "Privacy/deletion events must propagate to search, feed, cache, and analytics."
workflows:
  - name: "Publish to search"
    steps:
      - "Video published event"
      - "Indexer enriches document"
      - "Search index updated"
      - "Search service serves query"
    sync_or_async: "async"
    failure_modes:
      - "index lag"
      - "delete propagation lag"
    retry_idempotency_notes: "Use event ids and video version."
  - name: "View counter aggregation"
    steps:
      - "Player emits watch event"
      - "Stream buffers events"
      - "Deduplicate/validate"
      - "Aggregate by video/time"
      - "Update displayed count later"
    sync_or_async: "async"
    failure_modes:
      - "delayed count"
      - "duplicate events"
    retry_idempotency_notes: "Use event id/session/time bucketing."
diagrams_needed:
  - type: pipeline
    purpose: "Search indexing flow."
    preferred_generation_method: code_generated
    suggested_tool: graphviz
  - type: pipeline
    purpose: "Counter aggregation and feed signal flow."
    preferred_generation_method: code_generated
    suggested_tool: graphviz
scale_and_capacity:
  assumptions:
    - "Watch and engagement events are high volume."
  bottlenecks:
    - "hot video counters"
    - "indexing lag"
    - "feed feature freshness"
  scaling_strategy: "Use event streams, partitioned counters, and asynchronous derived indexes."
  l6_plus_extension: "Feature freshness has product value but also compute cost."
failure_modes:
  - failure: "Counter pipeline delayed"
    mitigation: "show stale counts and reconcile later"
    detection: "aggregation lag metric"
    l6_plus_extension: "Separate exact billing/abuse accounting from public display counts."
observability:
  metrics:
    - "indexing lag"
    - "counter aggregation lag"
    - "event consumer error rate"
  logs:
    - "event replay logs"
  traces:
    - "publish to index trace"
  alerts:
    - "index freshness breach"
  slos:
    - "search freshness"
source_grounding:
  known_public_facts: []
  inferred_design_choices:
    - "Search/feed/counter architecture."
    - "Event schemas and consistency choices."
  sources_to_consult:
    - topics/system_design_youtube/wiki/architecture_notes.md
    - topics/system_design_youtube/wiki/open_questions.md
l6_plus_callouts:
  - topic: "Event replay and deletion propagation"
    why_it_matters: "Derived systems become correctness risks when state changes after publication."
    where_to_include: "After search/feed/counter pipelines."
