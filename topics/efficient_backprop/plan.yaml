source_reading:
  pdf_direct_reading_status: readable_with_local_text_extraction_and_rendered_page_evidence
  extraction_needed: false
  notes: >
    The primary source is a 44-page PDF chapter/paper. Bootstrap extracted layout/plain
    text, rendered all pages under wiki/source_assets/pages/**, and created formula,
    figure, table, and visual audits. Formula transcription still requires visual
    verification during section authoring/review.

teaching_strategy:
  audience_summary: >
    beginner_technical: smart technical reader with undergraduate-level maturity,
    potentially weak math background, and novice-to-beginner coding. The article must
    build training intuition before formulas and paper mechanics.
  explanation_style: >
    Deep paper walkthrough with explicit prerequisite/background scaffolding. Use
    motivation before mechanics, intuition before equations, and tiny examples before
    Hessian/eigenvalue notation.
  visual_strategy: >
    Later authoring should use source_assets/** as evidence and prefer simplified
    code-generated teaching visuals for gradients, loss landscapes, conditioning,
    normalization, saturation, initialization, learning-rate stability, and first-order
    versus second-order optimization.
  code_strategy: >
    Code is optional and should be section-local. Use small educational demos only when
    they clarify scalar gradient descent, 2D quadratic conditioning, normalization, or
    activation saturation.

wiki_outputs:
  compiled_wiki_available: true
  foundation_stack_available: true
  source_asset_audit_available: true
  wiki_preview_available: true
