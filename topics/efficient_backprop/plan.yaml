    - wiki_preview/index.html

foundation_stack_guidance:
  must_consume_in_section_planner: true
  background_sections_likely_needed: true
  reason: >
    The source assumes gradients, Jacobians, Hessians, eigenvalues, conditioning, and
    optimizer families. A beginner article will be shallow or confusing unless it first
    builds training-loop and loss-geometry intuition.
  likely_background_sections:
    - section_01_training_setup_and_gradient_intuition
    - section_02_backprop_and_stochastic_updates
    - section_03_loss_geometry_conditioning_and_curvature
  prerequisites_to_introduce_before_core_paper_walkthrough:
    - supervised learning setup
    - loss function and parameters
    - gradient descent update intuition
    - backpropagation as gradient computation
    - stochastic versus batch updates
    - loss landscapes
    - learning-rate overshoot and divergence
    - curvature and Hessian intuition
    - eigenvalues/eigenvectors as principal curvature directions
    - conditioning
  prerequisites_to_inline:
    - exact Jacobian notation
    - Taylor expansion details
    - PCA/Karhunen-Loeve as decorrelation mechanism
    - conjugate-direction details
  prerequisites_deferred:
    - full Hessian derivations
    - formal proofs of convergence
    - implementation details for BFGS and Levenberg-Marquardt
    - modern optimizer comparisons unless additional sources are added
  notation_strategy: >
    Introduce symbols only after concrete objects: examples, target, prediction, loss,
    parameter, gradient, then layer variables. Delay Hessian/eigenvalue notation until
    after a 1D and 2D loss-landscape example.
  intuition_strategy: >
    Use small numeric examples and contour visuals before formulas. Explain every
    optimization trick as either changing the landscape, changing the step, or keeping
    gradients in a useful range.
  checklist_strategy: >
    Use the final prerequisite checklist from wiki/foundation_stack.md as input to
    section_plan.yaml acceptance criteria.

source_coverage_strategy:
  preserve_paper_depth: true
  adapted_structure_allowed: true
  adapted_structure_reason: >
    The paper's order is strong, but beginner readers need a foundation stack before
    the formula-heavy convergence and second-order sections. The final article should
    use an adapted structure that still covers every major source section deeply.
  major_source_sections_to_cover:
    - "Abstract and Introduction"
    - "2 Learning and Generalization"
    - "3 Standard Backpropagation"
    - "4 A Few Practical Tricks"
    - "5 Convergence of Gradient Descent"
    - "6 Classical second order optimization methods"
    - "7 Tricks to compute the Hessian information in multilayer networks"
    - "8 Analysis of the Hessian in multi-layer networks"
    - "9 Applying Second Order Methods to Multilayer Networks"
    - "10 Discussion and Conclusion"
  historical_current_policy: >
    Treat 1998 recommendations as source-era claims. Durable modern relevance can be
    discussed as interpretation, or should be grounded in additional sources if the user
    adds them.

