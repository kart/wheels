future_section_sequence_for_planner:
  - section_id: section_01_training_setup_and_gradient_intuition
    title: "What Training Is Trying To Change"
    foundation_role: background
    source_anchors:
      - wiki/foundation_stack.md
      - wiki/source_summary.md#2-learning-and-generalization
    reader_goal: "Understand examples, targets, parameters, loss, gradients, and why training is parameter adjustment."
  - section_id: section_02_backprop_and_stochastic_updates
    title: "Backprop Computes Gradients; Optimizers Use Them"
    foundation_role: background
    source_anchors:
      - wiki/source_summary.md#3-standard-backpropagation
      - wiki/source_summary.md#41-stochastic-versus-batch-learning
      - wiki/source_assets/formulas.md#formula_backprop_01_10
    reader_goal: "Separate backpropagation from the update rule and understand stochastic versus batch learning."
  - section_id: section_03_loss_geometry_conditioning_and_curvature
    title: "The Geometry Behind Slow Training"
    foundation_role: background
    source_anchors:
      - wiki/foundation_stack.md
      - wiki/source_summary.md#5-convergence-of-gradient-descent
      - wiki/source_assets/figures.md
    reader_goal: "Build intuition for learning rates, loss landscapes, Hessians, eigenvalues, and conditioning."
  - section_id: section_04_practical_tricks_input_activation_init
    title: "The Practical Tricks And Why They Work"
    foundation_role: core_topic
    source_anchors:
      - wiki/source_summary.md#4-practical-tricks
      - wiki/source_assets/formulas.md#formula_input_covariance_13
      - wiki/source_assets/formulas.md#formula_weight_initialization_14_16
      - wiki/source_assets/figures.md
    reader_goal: "Walk through input normalization, target scaling, activation saturation, initialization, and learning-rate heuristics."
  - section_id: section_05_convergence_and_conditioning
    title: "Convergence: From Learning Rates To Conditioning"
    foundation_role: core_topic
    source_anchors:
      - wiki/source_summary.md#5-convergence-of-gradient-descent
      - wiki/source_assets/formulas.md#formula_curvature_20_39
    reader_goal: "Understand the paper's theoretical explanation for the tricks without losing the beginner reader."
  - section_id: section_06_second_order_methods_and_limits
    title: "Classical Second-Order Methods: The Promise And The Wall"
    foundation_role: core_topic
    source_anchors:
      - wiki/source_summary.md#6-classical-second-order-optimization-methods
      - wiki/source_assets/formulas.md#formula_second_order_40_47
