      - wiki/source_summary.md#9-applying-second-order-methods-to-multilayer-networks
      - wiki/source_assets/formulas.md#formula_hessian_48_64
    reader_goal: "Explain diagonal Hessian, Hessian-vector products, stochastic diagonal Levenberg-Marquardt, and eigenvalue estimation."
  - section_id: section_08_historical_vs_still_useful
    title: "What To Take From Efficient BackProp Today"
    foundation_role: recap
    source_anchors:
      - wiki/historical_vs_current.md
      - wiki/source_summary.md#10-discussion-and-conclusion
    reader_goal: "Separate source-era recommendations from durable training intuition."

