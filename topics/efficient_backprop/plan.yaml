      - foundation_stack.md includes required foundation-stack structure and open uncertainties.
      - source asset audit files exist or explain empty categories.
      - wiki_preview/index.html exists.

  - id: phase_03_refine_plan_after_wiki
    name: "Refine plan after wiki"
    goal: "Refine plan.yaml into section-planning guidance after the wiki and foundation stack exist."
    inputs:
      - topic.yaml
      - plan.yaml
      - wiki/**
      - wiki/source_assets/**
      - wiki_preview/index.html
    outputs:
      - plan.yaml
    instructions:
      - Preserve completed phase ids.
      - Preserve source fidelity, source asset, and foundation-stack guidance.
      - Do not generate sections/**, section prose, visuals, code, outputs/**, reviews/**, or publish artifacts.
    completion_check:
      - plan.yaml preserves completed bootstrap phases.
      - plan.yaml identifies that foundation_stack.md must be consumed by wheels-section-planner.
      - future section/content work is split into small, reviewable, user-approved sections.

  - id: phase_04_section_planning_after_user_approval
    name: "Section planning after user approval"
    goal: "Future phase only: use wheels-section-planner to convert wiki and foundation stack into section contracts."
    inputs:
