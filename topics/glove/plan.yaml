      - prompts/audience_profiles.md
      - templates/article_shapes.md
    outputs:
      - wiki/source_map.md
      - wiki/open_questions.md
    instructions:
      - Completed. Preserve this phase id and outputs.
      - Do not modify topic.yaml or raw/.
    completion_check:
      - wiki/source_map.md exists and maps all major paper sections.
      - wiki/open_questions.md exists and records extraction caveats and non-overclaim warnings.

  - id: phase_02_compile_wiki
    name: "Compile source-grounded wiki"
