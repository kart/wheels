    instructions:
      - Completed. Preserve this phase id and outputs.
      - Do not generate lesson prose, visuals, code, preview HTML, review files, or publish files.
    completion_check:
      - All listed wiki outputs exist.
      - Wiki covers the paper's introduction, related work, model, experiments, model analysis, runtime, word2vec comparison, and conclusion.

  - id: phase_03_refine_plan_after_wiki
