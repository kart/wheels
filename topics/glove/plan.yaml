topic_id: glove
plan_version: 2
status: wiki_compiled_replanned

source_reading:
  pdf_direct_reading_status: readable_with_pdftotext
  extraction_needed: false
  notes: >
    The primary source is topics/glove/raw/papers/glove.pdf, a 12-page paper.
    Text extraction is usable. Figures, tables, and equations should still be
    spot-checked visually before final publish prose because the PDF is a
    two-column paper and charts are not available as exact tabular data.

completed_phases:
  - phase_01_source_extraction_and_source_map
  - phase_02_compile_wiki

teaching_strategy:
  audience_summary: >
    Beginner technical reader with undergraduate-level maturity, weak assumed
    math, and novice-to-beginner coding skill.
  explanation_style: >
    Use an adapted paper-deep-dive structure: teach prerequisites before the
    densest derivation, while preserving coverage of every major paper section.
    Motivation comes before mechanics, examples before abstraction, and formula
    notation before equations.
  visual_strategy: >
    Use small mechanism visuals: corpus-to-co-occurrence matrix, ice/steam ratio
    table, objective-term anatomy, qualitative weighting curve, training
    workflow, and evaluation map. Do not recreate exact chart curves unless
    values are manually extracted.
  code_strategy: >
    Use only tiny educational Python snippets if they clarify co-occurrence
    counts, ratios, or one weighted loss term. Do not imply toy code reproduces
    paper-scale results.
  source_fidelity_strategy: >
    Distinguish "the paper reports" from later teaching interpretation. Keep
    the paper's caveats around word2vec comparisons, corpus effects, and analogy
    benchmarks near the relevant claims.

proposed_wiki_structure:
  - path: wiki/index.md
    purpose: "Navigation and core source-claim summary."
  - path: wiki/source_map.md
    purpose: "Paper section, figure, table, equation, and experiment inventory."
  - path: wiki/paper_walkthrough.md
    purpose: "Source-grounded section-by-section paper notes."
  - path: wiki/concepts.md
    purpose: "Beginner prerequisite explanations."
  - path: wiki/mechanism_notes.md
    purpose: "GloVe derivation, objective, symbols, and tiny examples."
  - path: wiki/experiments_and_results.md
    purpose: "Evaluation setup, reported results, model analysis, and caveats."
  - path: wiki/teaching_plan_notes.md
    purpose: "Reader confusions, visuals, toy-to-real bridges, acceptance notes."
  - path: wiki/glossary.md
    purpose: "Symbols and terminology."
  - path: wiki/open_questions.md
    purpose: "Extraction caveats and non-overclaim warnings."

reader_facing_section_plan:
  structure_type: adapted_paper_deep_dive
  justification: >
    The GloVe paper's derivation is the conceptual center, but a beginner needs
    co-occurrence, conditional probability, ratios, dot products, logs, and
    weighted least squares before the paper's Section 3 is readable. The section
    plan therefore teaches prerequisites just-in-time, while preserving coverage
    of Abstract, Sections 1-5, tables, figures, experiments, model analysis,
    runtime, and comparison caveats.
  sections:
    - id: phase_05_section_01_motivation
      section_title: "Why GloVe Exists"
      reader_question: "Why did the paper need a new word-vector model?"
      source_coverage:
        - wiki/paper_walkthrough.md: Abstract, Section 1
        - wiki/source_map.md: Abstract, Introduction
      prerequisite_concepts:
        - word vector
        - distributional meaning
        - analogy as an evaluation probe
      concepts_allowed:
        - global matrix factorization
        - local context-window methods
        - why analogy structure matters
        - source-claim versus interpretation boundary
      visuals_code_expected:
        visuals:
          - "Contrast diagram: global counts versus local windows"
        code: []
      scoped_outputs:
        - outputs/lesson.md
        - outputs/visual_plan.md
        - outputs/visuals/glove-global-vs-local.svg
        - outputs/preview.html
      reviewer_report: reviews/phase_05_section_01_motivation_review.md
      fix_log: reviews/phase_05_section_01_motivation_fix_log.md
      approval_gate: "Stop and wait for user approval before phase_06_section_02_related_work."

    - id: phase_06_section_02_related_work
      section_title: "The Older Choices: Count Tables and Prediction Windows"
      reader_question: "What were matrix factorization and window prediction methods each good and bad at?"
      source_coverage:
        - wiki/paper_walkthrough.md: Section 2
        - wiki/concepts.md: context window, co-occurrence matrix
      prerequisite_concepts:
        - term-document matrix
        - term-term matrix
        - context window
      concepts_allowed:
        - LSA
        - HAL
        - PPMI and HPCA as count transformations
        - skip-gram and CBOW at a high level
        - why repeated local windows relate to global counts
      visuals_code_expected:
        visuals:
          - "Mini corpus showing local windows accumulating into a count table"
        code: []
      scoped_outputs:
        - outputs/lesson.md
        - outputs/visual_plan.md
        - outputs/visuals/glove-window-to-counts.svg
        - outputs/preview.html
      reviewer_report: reviews/phase_06_section_02_related_work_review.md
      fix_log: reviews/phase_06_section_02_related_work_fix_log.md
      approval_gate: "Stop and wait for user approval before phase_07_section_03_ratio_insight."

    - id: phase_07_section_03_ratio_insight
      section_title: "The Ice/Steam Ratio Insight"
      reader_question: "Why does GloVe start from ratios of co-occurrence probabilities?"
      source_coverage:
        - wiki/paper_walkthrough.md: Section 3 opening and Table 1
        - wiki/mechanism_notes.md: Why Ratios
        - wiki/concepts.md: conditional probability, probability ratios
      prerequisite_concepts:
        - co-occurrence count
        - conditional probability
        - ratio
      concepts_allowed:
        - discriminative context words
        - non-discriminative context words
        - Table 1 ice/steam example
        - why ratios are more informative than raw probabilities
      visuals_code_expected:
        visuals:
          - "Simplified ice/steam ratio table using sourced values"
        code:
          - "Optional tiny Python ratio calculation from dictionary counts"
      scoped_outputs:
        - outputs/lesson.md
        - outputs/visual_plan.md
        - outputs/visuals/glove-ice-steam-ratios.svg
        - outputs/code/glove_toy_ratios.py
        - outputs/preview.html
      reviewer_report: reviews/phase_07_section_03_ratio_insight_review.md
      fix_log: reviews/phase_07_section_03_ratio_insight_fix_log.md
      approval_gate: "Stop and wait for user approval before phase_08_section_04_objective_derivation."

    - id: phase_08_section_04_objective_derivation
      section_title: "From Ratios to the GloVe Objective"
      reader_question: "How do the paper's desiderata become a trainable objective?"
      source_coverage:
        - wiki/paper_walkthrough.md: Section 3 equations 1-9
        - wiki/mechanism_notes.md: derivation, core equation, objective, weighting function
        - wiki/glossary.md: symbol glossary
      prerequisite_concepts:
        - vector difference
        - dot product
        - logarithm
        - bias term
        - squared error
      concepts_allowed:
        - function F and probability ratios
        - vector differences as relation carriers
        - dot product as scalar compatibility
        - log-count equation
        - word and context biases
        - weighted least-squares objective
        - weighting function with x_max and alpha
      visuals_code_expected:
        visuals:
          - "Objective-term anatomy"
          - "Qualitative weighting curve"
        code:
          - "Optional one-term weighted loss calculation"
      scoped_outputs:
        - outputs/lesson.md
        - outputs/visual_plan.md
        - outputs/visuals/glove-objective-anatomy.svg
        - outputs/visuals/glove-weighting-function.svg
        - outputs/code/glove_one_loss_term.py
        - outputs/preview.html
      reviewer_report: reviews/phase_08_section_04_objective_derivation_review.md
      fix_log: reviews/phase_08_section_04_objective_derivation_fix_log.md
      approval_gate: "Stop and wait for user approval before phase_09_section_05_training_workflow."

    - id: phase_09_section_05_training_workflow
      section_title: "What Training Actually Changes"
      reader_question: "What are the inputs, parameters, updates, and final outputs of GloVe training?"
      source_coverage:
        - wiki/paper_walkthrough.md: Sections 3.1, 3.2, 4.2
        - wiki/mechanism_notes.md: Training Workflow
        - wiki/concepts.md: word vectors and context vectors
      prerequisite_concepts:
        - sparse co-occurrence matrix
        - nonzero entries
        - parameter update
      concepts_allowed:
        - relationship to grouped window objectives
        - complexity intuition
        - vocabulary and context window choices
        - distance weighting by 1/d
        - AdaGrad at an intuition level
        - W and Wtilde combined as W + Wtilde
      visuals_code_expected:
        visuals:
          - "Corpus to co-occurrence matrix to sampled pair to parameter update"
        code:
          - "Optional tiny co-occurrence matrix builder"
      scoped_outputs:
        - outputs/lesson.md
        - outputs/visual_plan.md
        - outputs/visuals/glove-training-workflow.svg
        - outputs/code/glove_toy_cooccurrence.py
        - outputs/preview.html
      reviewer_report: reviews/phase_09_section_05_training_workflow_review.md
      fix_log: reviews/phase_09_section_05_training_workflow_fix_log.md
      approval_gate: "Stop and wait for user approval before phase_10_section_06_evaluation_results."

    - id: phase_10_section_06_evaluation_results
      section_title: "How the Paper Evaluates GloVe"
      reader_question: "What evidence does the paper give that the vectors are useful?"
      source_coverage:
        - wiki/paper_walkthrough.md: Sections 4.1, 4.2, 4.3
        - wiki/experiments_and_results.md: Evaluation Methods, Main Result Claims
        - wiki/source_map.md: Tables 2-4
      prerequisite_concepts:
        - cosine similarity
        - Spearman rank correlation
        - downstream task
      concepts_allowed:
        - analogy benchmark
        - word similarity tasks
        - NER with CRF features
        - corpora and training setup
        - reported result tables with caveats
      visuals_code_expected:
        visuals:
          - "Evaluation map: analogy, similarity, NER"
        code: []
      scoped_outputs:
        - outputs/lesson.md
        - outputs/visual_plan.md
        - outputs/visuals/glove-evaluation-map.svg
        - outputs/preview.html
      reviewer_report: reviews/phase_10_section_06_evaluation_results_review.md
      fix_log: reviews/phase_10_section_06_evaluation_results_fix_log.md
      approval_gate: "Stop and wait for user approval before phase_11_section_07_model_analysis."

    - id: phase_11_section_07_model_analysis
      section_title: "What Changes When You Vary Dimensions, Windows, Corpora, and Training Time"
      reader_question: "What does the paper's model analysis teach about using GloVe?"
      source_coverage:
        - wiki/paper_walkthrough.md: Sections 4.4-4.7
        - wiki/experiments_and_results.md: Model Analysis
        - wiki/source_map.md: Figures 2-4
      prerequisite_concepts:
        - vector dimension
        - symmetric versus asymmetric context
        - corpus composition
        - preprocessing cost versus training cost
      concepts_allowed:
        - diminishing returns after about 200 dimensions
        - syntactic versus semantic context-window behavior
        - corpus size and corpus composition caveat
        - runtime split between building X and training
        - controlled word2vec comparison and its caveat
      visuals_code_expected:
        visuals:
          - "Qualitative model-analysis summary grid"
        code: []
      scoped_outputs:
        - outputs/lesson.md
        - outputs/visual_plan.md
        - outputs/visuals/glove-model-analysis-summary.svg
        - outputs/preview.html
      reviewer_report: reviews/phase_11_section_07_model_analysis_review.md
      fix_log: reviews/phase_11_section_07_model_analysis_fix_log.md
      approval_gate: "Stop and wait for user approval before phase_12_section_08_limits_and_recap."

    - id: phase_12_section_08_limits_and_recap
      section_title: "What GloVe Proves, What It Does Not, and How to Use It"
      reader_question: "What should a practical reader take away from the paper?"
      source_coverage:
        - wiki/paper_walkthrough.md: Section 5
        - wiki/open_questions.md: Claims Not To Overstate
        - wiki/teaching_plan_notes.md: Toy-to-Real Bridges
      prerequisite_concepts:
        - source claim
        - teaching interpretation
        - pretrained vector workflow
      concepts_allowed:
        - paper conclusion
        - practical train/use/evaluate workflow
        - analogy benchmark caveats
        - word2vec comparison caveats
        - recap of mechanism
        - what came next at a high level, only if clearly marked as context beyond the paper
      visuals_code_expected:
        visuals:
          - "Practical workflow: train or download vectors, plug into task, evaluate"
        code: []
      scoped_outputs:
        - outputs/lesson.md
        - outputs/visual_plan.md
        - outputs/visuals/glove-practical-workflow.svg
        - outputs/preview.html
      reviewer_report: reviews/phase_12_section_08_limits_and_recap_review.md
      fix_log: reviews/phase_12_section_08_limits_and_recap_fix_log.md
      approval_gate: "Stop and wait for user approval before final audit."

