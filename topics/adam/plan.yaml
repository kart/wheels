      - wiki/source_assets/pages/paper_01_page_03.png
      - wiki/source_assets/pages/paper_01_page_05.png
    prerequisites_to_introduce:
      - coordinate-wise update
      - square root scaling
      - scale invariance caveat
    allowed_concepts:
      - effective step
      - per-coordinate denominator as brake
      - signal-to-noise-ratio interpretation
