      - wiki/source_assets/pages/paper_01_page_07.png
      - wiki/source_assets/pages/paper_01_page_08.png
      - wiki/source_assets/pages/paper_01_page_09.png
      - wiki/source_assets/pages/paper_01_page_10.png
    prerequisites_to_introduce:
      - qualitative chart reading
      - train loss vs generalization caveat
      - infinity norm, informally
    allowed_concepts:
      - MNIST and IMDB logistic regression setup
      - MLP/dropout and CIFAR-10 ConvNet setup
