topic_id: adam
plan_version: 2
status: replanned_after_wiki

source_reading:
  pdf_direct_reading_status: readable_with_pdftotext_and_rendered_pages
  extraction_needed: false
  notes: >
    Primary source is topics/adam/raw/papers/adam.pdf, a 15-page ICLR 2015
    paper. Text extraction and all-page rendering are complete under wiki/source_assets/.
    Formula layout and experiment plots still require visual spot checks before final prose.

completed_bootstrap_phases:
  - phase_01_source_extraction_and_source_map
  - phase_02_compile_wiki

teaching_strategy:
  audience_summary: >
    Beginner technical reader with undergraduate maturity, weak-to-moderate math
    comfort, and novice coding skill.
  explanation_style: >
    Use an adapted paper_deep_dive structure: teach the prerequisites and mechanism
    before walking through theory, experiments, and variants. Explicitly map the
    adapted sections back to every major paper section so the article does not
    become a high-level overview.
  visual_strategy: >
    Use source-audited page screenshots as evidence only. Later reader-facing
    visuals should be simplified redraws: noisy SGD motivation, Adam state loop,
    moving-average cold start, coordinate-wise scaling, regret scope, and
    qualitative experiment summary.
  code_strategy: >
    Include a small educational Adam step implementation only after the update
    loop is explained. It should demonstrate state changes on a toy objective,
    not reproduce paper experiments.

wiki_structure:
  - path: wiki/index.md
    purpose: Compiled overview and source-fidelity warnings.
  - path: wiki/source_map.md
    purpose: Source inventory, page map, and extraction limitations.
  - path: wiki/paper_walkthrough.md
    purpose: Section-by-section source coverage for the Adam paper.
  - path: wiki/algorithm_notes.md
    purpose: Adam update equations, state variables, hyperparameters, and properties.
  - path: wiki/bias_correction_notes.md
    purpose: Initialization bias derivation and teaching examples.
  - path: wiki/convergence_notes.md
    purpose: Regret framing, theorem assumptions, and appendix proof map.
  - path: wiki/experiments_notes.md
    purpose: Experimental setup, qualitative results, and caveats.
  - path: wiki/glossary.md
    purpose: Prerequisites and symbol definitions.
  - path: wiki/open_questions.md
    purpose: Formula/chart verification items for later work.
  - path: wiki/source_assets/
    purpose: Generated source evidence, rendered pages, formula/figure/table audits.

reader_facing_sections:
  - id: section_01_problem_and_prerequisites
    section_title: "Why Adam Exists"
    reader_question: "Why is plain stochastic gradient descent not enough for noisy, high-dimensional training?"
    paper_coverage:
      - Abstract
      - Section 1 Introduction
      - Section 5 Related Work, high-level optimizer context
    source_coverage:
      - wiki/index.md
      - wiki/source_map.md
      - wiki/paper_walkthrough.md
      - wiki/glossary.md
    source_asset_coverage:
      - wiki/source_assets/pages/paper_01_page_01.png
      - wiki/source_assets/pages/paper_01_page_05.png
    prerequisites_to_introduce:
      - objective/loss function
      - parameter vector
      - gradient
      - stochastic gradient/minibatch
      - sparse gradient
    allowed_concepts:
      - first-order optimization
      - noisy updates
      - why optimizers keep state
      - SGD, momentum, AdaGrad, RMSProp as motivations
    expected_visuals_or_code:
      - "visual: qualitative noisy-gradient path compared with a smoother stateful update"
      - "code: none"
    scoped_output_paths:
      - outputs/lesson.md
      - outputs/visual_plan.md
      - outputs/preview.html
    reviewer_report_path: reviews/phase_10_section_01_problem_and_prerequisites_review.md
    fix_log_path: reviews/phase_10_section_01_problem_and_prerequisites_fix_log.md
    approval_gate: "Stop after this section's review/fix loop and wait for user approval before section_02."

  - id: section_02_adam_update_loop
    section_title: "The Adam Update Loop"
    reader_question: "What exactly changes inside Adam at each training step?"
    paper_coverage:
      - Section 2 Algorithm
      - Algorithm 1
    source_coverage:
      - wiki/algorithm_notes.md
      - wiki/paper_walkthrough.md
      - wiki/glossary.md
    source_asset_coverage:
      - wiki/source_assets/formulas.md#F01
      - wiki/source_assets/formulas.md#F02
      - wiki/source_assets/figures.md#G01
      - wiki/source_assets/pages/paper_01_page_02.png
    prerequisites_to_introduce:
      - vector operation
      - elementwise square
      - exponential moving average
      - learning rate/stepsize
    allowed_concepts:
      - Adam inputs and state
      - first moment `m_t`
      - second raw moment `v_t`
      - bias-corrected estimates
      - parameter update
      - default hyperparameters as paper-tested defaults, not universal constants
    expected_visuals_or_code:
      - "visual: Adam state machine with gradient input and parameter output"
      - "visual: two-coordinate update table"
      - "code: beginner-friendly Python function for one Adam step"
    scoped_output_paths:
      - outputs/lesson.md
      - outputs/visual_plan.md
      - outputs/code/
      - outputs/preview.html
    reviewer_report_path: reviews/phase_11_section_02_adam_update_loop_review.md
    fix_log_path: reviews/phase_11_section_02_adam_update_loop_fix_log.md
    approval_gate: "Stop after this section's review/fix loop and wait for user approval before section_03."

  - id: section_03_bias_correction
    section_title: "The Cold Start Problem"
    reader_question: "Why does Adam divide by `1 - beta^t`, and what goes wrong without it?"
    paper_coverage:
      - Section 3 Initialization Bias Correction
      - Figure 4 bias-correction experiment
    source_coverage:
      - wiki/bias_correction_notes.md
      - wiki/algorithm_notes.md
      - wiki/experiments_notes.md
      - wiki/open_questions.md
    source_asset_coverage:
      - wiki/source_assets/formulas.md#F04
      - wiki/source_assets/figures.md#G05
      - wiki/source_assets/pages/paper_01_page_03.png
      - wiki/source_assets/pages/paper_01_page_04.png
      - wiki/source_assets/pages/paper_01_page_08.png
    prerequisites_to_introduce:
      - expected value, informally
      - geometric/exponential weights, informally
      - stationary vs changing gradient distribution
    allowed_concepts:
      - zero initialization bias
      - "`v_t` recurrence expansion"
      - correction factors
      - sparse-gradient sensitivity
      - qualitative role of Figure 4
    expected_visuals_or_code:
      - "visual: early moving-average weights before and after correction"
      - "worked example: `beta_2 = 0.999`, `g^2 = 4`"
      - "code: optional tiny table generator if useful"
    scoped_output_paths:
      - outputs/lesson.md
      - outputs/visual_plan.md
      - outputs/preview.html
    reviewer_report_path: reviews/phase_12_section_03_bias_correction_review.md
    fix_log_path: reviews/phase_12_section_03_bias_correction_fix_log.md
    approval_gate: "Stop after this section's review/fix loop and wait for user approval before section_04."

  - id: section_04_update_properties_and_related_work
    section_title: "Why The Update Behaves Differently From SGD"
    reader_question: "How do the first and second moments change Adam's step size and direction?"
    paper_coverage:
      - Section 2.1 Adam's Update Rule
