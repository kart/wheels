      - approximate step-size bound with caveats
    expected_visuals_or_code:
      - "visual: same gradient direction with different coordinate scales"
      - "visual: optimizer family comparison table"
      - "code: none unless needed to extend prior toy demo"
    scoped_output_paths:
      - outputs/lesson.md
      - outputs/visual_plan.md
      - outputs/preview.html
