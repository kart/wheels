      - "`O(sqrt(T))` and average regret intuition"
      - appendix proof map
      - nonconvex deep-learning caveat
    expected_visuals_or_code:
      - "visual: online regret timeline"
      - "visual: assumption checklist"
      - "code: none"
    scoped_output_paths:
      - outputs/lesson.md
      - outputs/visual_plan.md
      - outputs/preview.html
    reviewer_report_path: reviews/phase_14_section_05_theory_scope_review.md
    fix_log_path: reviews/phase_14_section_05_theory_scope_fix_log.md
    approval_gate: "Stop after this section's review/fix loop and wait for user approval before section_06."

  - id: section_06_experiments_variants_and_caveats
    section_title: "Experiments, AdaMax, And Practical Caveats"
    reader_question: "What evidence did the paper show, what variants did it add, and how should we use Adam in practice?"
    paper_coverage:
