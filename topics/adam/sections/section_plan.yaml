  open_visual_verification_items:
    - item: "Verify Algorithm 1 notation on page 2 before final prose."
    - item: "Verify efficient computation order F02 before implementation notes."
    - item: "Verify Section 2.1 effective step-size bound cases on page 3."
    - item: "Verify bias-correction summation indices, equation numbering, and zeta explanation on pages 3-4."
    - item: "Verify theorem assumptions and appendix formulas on pages 5 and 12-15."
    - item: "Treat Figures 1-4 qualitatively unless exact chart values are manually extracted."
    - item: "Verify AdaMax p-norm to infinity-norm derivation on pages 8-9."
mechanism_strategy: >
  Each section should be carried by a concrete mechanism: motivation trace,
  state-machine walkthrough, worked cold-start example, coordinate-wise scaling
  diagram, regret timeline, or qualitative experiment matrix.
media_strategy: >
  Plan simplified reader-facing visuals later. Do not use source page screenshots
  as final visuals by default; they are evidence references. Avoid exact numeric
  charts unless the values are sourced.
code_strategy: >
  Code is required only for the Adam update-loop section, where a tiny educational
  Python step function can clarify state changes. Later sections may refer back
  to it but should not force extra code.
toy_to_real_strategy: >
  Use tiny one-coordinate or two-coordinate examples to teach mechanics, then
  bridge back to high-dimensional minibatch optimization, sparse bag-of-words
  features, dropout noise, and CNN training as described in the paper.
user_review_policy:
  mode: section_by_section
  must_wait_for_approval: true
status: planned
