topic_id: adam
topic_dir: topics/adam
article_shape: paper_deep_dive
audience_profile: beginner_technical
planning_inputs:
  - topics/adam/topic.yaml
  - topics/adam/plan.yaml
  - topics/adam/wiki/index.md
  - topics/adam/wiki/source_map.md
  - topics/adam/wiki/paper_walkthrough.md
  - topics/adam/wiki/algorithm_notes.md
  - topics/adam/wiki/bias_correction_notes.md
  - topics/adam/wiki/convergence_notes.md
  - topics/adam/wiki/experiments_notes.md
  - topics/adam/wiki/glossary.md
  - topics/adam/wiki/open_questions.md
  - topics/adam/wiki/source_assets/index.yaml
  - topics/adam/wiki/source_assets/formulas.md
  - topics/adam/wiki/source_assets/figures.md
  - topics/adam/wiki/source_assets/tables.md
  - topics/adam/wiki/source_assets/visual_audit.md
section_order:
  - section_id: section_01_problem_and_prerequisites
    title: "Why Adam Exists"
    reason_for_position: "Motivates stochastic optimization and establishes the prerequisite vocabulary before any equations."
  - section_id: section_02_adam_update_loop
    title: "The Adam Update Loop"
    reason_for_position: "Introduces the paper's central mechanism while the reader still has the motivation fresh."
  - section_id: section_03_bias_correction
    title: "The Cold Start Problem"
    reason_for_position: "Explains the least obvious part of Algorithm 1 after the reader knows the state variables."
  - section_id: section_04_update_properties_and_related_work
    title: "Why The Update Behaves Differently From SGD"
    reason_for_position: "Uses the mechanism to explain update behavior and connect Adam to prior optimizers."
  - section_id: section_05_theory_scope
    title: "What The Convergence Analysis Actually Says"
    reason_for_position: "Covers the proof claims after the algorithm and update properties are understandable."
  - section_id: section_06_experiments_variants_and_caveats
    title: "Experiments, AdaMax, And Practical Caveats"
    reason_for_position: "Closes with empirical evidence, variants, real-world usage, caveats, recap, and what came next."
authoring_order_notes: >
  Author one section at a time in this order. Each section must be reviewed,
  fixed, and approved before the next section begins.
section_dependencies:
  section_01_problem_and_prerequisites: []
  section_02_adam_update_loop:
    - section_01_problem_and_prerequisites
  section_03_bias_correction:
    - section_02_adam_update_loop
  section_04_update_properties_and_related_work:
    - section_02_adam_update_loop
    - section_03_bias_correction
  section_05_theory_scope:
    - section_02_adam_update_loop
    - section_04_update_properties_and_related_work
  section_06_experiments_variants_and_caveats:
    - section_03_bias_correction
    - section_04_update_properties_and_related_work
    - section_05_theory_scope
global_prerequisite_ladder:
  - objective/loss function
  - parameter vector
  - gradient and stochastic gradient
  - minibatch noise and sparse gradients
  - exponential moving average
  - elementwise vector operations and squared gradients
  - bias correction
  - coordinate-wise adaptive scaling
  - online learning and regret
  - qualitative chart reading
source_coverage_strategy: >
  Use an adapted paper-deep-dive structure that preserves every major paper
  section: motivation and related work, Algorithm 1, update-rule properties,
  bias correction, convergence analysis and appendix, experiments, AdaMax,
  temporal averaging, and conclusion. Keep source claims separate from teaching
  interpretation.
