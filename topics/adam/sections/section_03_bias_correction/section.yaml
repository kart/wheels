section_id: section_03_bias_correction
title: "The Cold Start Problem"
status: planned
learning_goal: "Explain initialization bias and why Adam divides moment estimates by 1 - beta^t."
reader_outcome: "The reader can compute a tiny first-step correction and explain why uncorrected v_t can be too small early."
source_anchors:
  - source: topics/adam/wiki/bias_correction_notes.md
    relevant_claims:
      - "Moving averages start at zero and are biased toward zero early."
      - "The second raw moment expansion leads to a 1 - beta_2^t factor under stationarity."
      - "Sparse-gradient cases make correction especially important."
  - source: topics/adam/wiki/experiments_notes.md
    relevant_claims:
      - "Figure 4 compares bias-corrected Adam with a no-correction variant."
source_assets:
  formulas:
    - asset_id: F04_bias_correction_expansion
      reason: "Source equation for the moving-average expansion and expected-value correction."
      evidence_image: topics/adam/wiki/source_assets/pages/paper_01_page_04.png
      visual_verification_needed: true
  figures:
    - asset_id: G05_figure_4_bias_correction
      reason: "Empirical evidence that bias correction matters for beta_2 close to 1."
      evidence_image: topics/adam/wiki/source_assets/pages/paper_01_page_08.png
      recommended_treatment: redraw_simplified
      visual_verification_needed: true
  tables: []
