  - asset_id: G05_figure_4_bias_correction
    reason: "Use qualitatively unless exact values are extracted."
prerequisite_concepts:
  - expected value, informally
  - geometric/exponential weights, informally
  - stationary vs changing gradient distribution
depends_on_sections:
  - section_02_adam_update_loop
authoring_order_notes: "Use the cold-start intuition before equations; keep zeta as a caveat."
key_questions_to_answer:
  - "Why are m_0 and v_0 initialized to zero?"
  - "How does zero initialization bias early moving averages?"
  - "What does dividing by 1 - beta^t fix?"
  - "Why is this especially important for beta_2 near 1?"
core_mechanism:
  type: worked_example
  why_this_mechanism: "A beta_2 = 0.999 and g^2 = 4 example makes the correction visible without heavy math."
media_needed:
  - type: simplified chart
    purpose: "Show early moving-average cold start before and after correction."
code_needed:
  required: false
  why: "A worked table is clearer than code; optional later code can generate the table if useful."
  artifact_type: optional educational table generator
toy_or_scaled_down_demo:
  description: "Single coordinate with constant squared gradient 4 and beta_2 = 0.999."
  what_it_demonstrates: "v_1 is 0.004 but v_hat_1 is 4."
  what_it_omits: "Non-stationary gradients and full vector behavior."
toy_to_real_bridge: "Connect small beta correction to sparse gradients where many coordinates need long averaging windows."
expected_reader_confusions:
  - "Thinking bias correction is arbitrary tuning rather than a cold-start correction."
  - "Assuming the stationarity derivation holds exactly in all training."
  - "Confusing beta close to 1 with fast adaptation."
section_specific_review_checks:
  - "Includes tiny numerical example after intuition."
  - "Does not overstate Figure 4 with invented numeric values."
  - "Explains what changes in v_t and v_hat_t."
completion_criteria:
  - "Reader can explain the role of 1 - beta_1^t and 1 - beta_2^t."
  - "Section flags stationarity and sparse-gradient caveats."
user_review_gate:
