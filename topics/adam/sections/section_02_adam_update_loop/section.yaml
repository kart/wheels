    reason: "Verify hats, square roots, and epsilon placement before presenting implementation caveat."
prerequisite_concepts:
  - vector operation
  - elementwise square
  - exponential moving average
  - learning rate/stepsize
depends_on_sections:
  - section_01_problem_and_prerequisites
authoring_order_notes: "Teach the clear Algorithm 1 order before mentioning the efficient rearrangement."
key_questions_to_answer:
  - "What are Adam's inputs?"
  - "What state does Adam carry between steps?"
  - "What changes during one optimizer step?"
  - "What are the outputs?"
core_mechanism:
  type: state_machine
  why_this_mechanism: "Adam is best understood as state that transforms a gradient input into a parameter update."
media_needed:
  - type: state-machine diagram
    purpose: "Show gradient input, m/v updates, bias correction, and theta output."
  - type: table
    purpose: "Trace a two-coordinate numerical example."
code_needed:
  required: true
  why: "A tiny Adam step function clarifies the update state after the mechanism is explained."
  artifact_type: educational Python function
toy_or_scaled_down_demo:
  description: "One or two coordinates with fixed alpha, beta_1, beta_2, and a single gradient."
  what_it_demonstrates: "How m_t, v_t, m_hat_t, v_hat_t, and theta_t change."
  what_it_omits: "Full training loops, neural network gradients, and paper-scale experiments."
toy_to_real_bridge: "Explain that real models apply the same elementwise update across millions of parameters."
expected_reader_confusions:
  - "Thinking m_t and v_t are model parameters rather than optimizer state."
  - "Confusing squared gradient with second derivative."
  - "Using default hyperparameters as guaranteed best settings."
section_specific_review_checks:
  - "Every symbol is introduced before use."
  - "Code, if authored later, matches Algorithm 1 and is explained before display."
  - "No final prose quotes the efficient order without verification."
completion_criteria:
  - "Reader can run through one Adam step in words."
  - "Section includes source-grounded Algorithm 1 coverage."
user_review_gate:
  required: true
  instruction: "Stop after this section is authored/reviewed/fixed and wait for user approval before continuing."
