section_id: section_02_adam_update_loop
title: "The Adam Update Loop"
status: planned
learning_goal: "Explain Algorithm 1 as a step-by-step state update with all symbols introduced before formulas."
reader_outcome: "The reader can trace one Adam step and identify what changes in t, m, v, corrected moments, and theta."
source_anchors:
  - source: topics/adam/wiki/algorithm_notes.md
    relevant_claims:
      - "Adam keeps m_t as a moving average of gradients and v_t as a moving average of squared gradients."
      - "The update computes corrected estimates before changing theta."
      - "Default hyperparameters are paper-tested defaults, not universal constants."
  - source: topics/adam/wiki/paper_walkthrough.md
    relevant_claims:
      - "Algorithm 1 is the backbone of the paper's mechanism."
