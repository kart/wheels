section_id: section_01_problem_and_prerequisites
title: "Why Adam Exists"
status: planned
learning_goal: "Motivate Adam from stochastic optimization problems and establish the minimum vocabulary needed before Algorithm 1."
reader_outcome: "The reader can explain why noisy, sparse, high-dimensional gradients make plain SGD feel limited and why an optimizer might keep state."
source_anchors:
  - source: topics/adam/wiki/paper_walkthrough.md
    relevant_claims:
      - "The paper focuses on high-dimensional stochastic optimization using first-order gradients."
      - "Stochasticity can come from minibatches or other noise sources such as dropout."
      - "Adam is positioned as combining advantages associated with AdaGrad and RMSProp."
  - source: topics/adam/wiki/glossary.md
    relevant_claims:
      - "Defines theta, f(theta), f_t(theta), gradient, stochastic gradient, sparse gradient, and first-order method."
source_assets:
  formulas: []
  figures: []
  tables: []
  pages:
    - asset_id: page_01_abstract_intro
      reason: "Evidence for abstract claims and introduction motivation."
      evidence_image: topics/adam/wiki/source_assets/pages/paper_01_page_01.png
    - asset_id: page_05_related_work_start
      reason: "Evidence for related optimizer context."
      evidence_image: topics/adam/wiki/source_assets/pages/paper_01_page_05.png
visual_verification_required: []
prerequisite_concepts:
  - objective/loss function
  - parameter vector
  - gradient
  - stochastic gradient/minibatch
  - sparse gradient
depends_on_sections: []
authoring_order_notes: "First section; do not assume optimization or ML expertise beyond basic technical maturity."
key_questions_to_answer:
  - "What problem are we solving?"
  - "What did people do before Adam?"
  - "What bottleneck or confusion makes stateful optimizers useful?"
core_mechanism:
  type: visual_trace
  why_this_mechanism: "A noisy-gradient trace can show why repeated raw nudges are unstable before introducing equations."
media_needed:
  - type: simplified diagram
    purpose: "Contrast raw SGD steps with a stateful optimizer smoothing noisy hints."
code_needed:
  required: false
  why: "This section is conceptual motivation; code would distract before the update rule exists."
  artifact_type: none
toy_or_scaled_down_demo:
  description: "One parameter moving downhill with noisy gradients."
  what_it_demonstrates: "Why one gradient can be a noisy hint rather than a perfect direction."
  what_it_omits: "Real models have many parameters, minibatches, and per-coordinate behavior."
toy_to_real_bridge: "Connect the toy noisy update to high-dimensional models and sparse bag-of-words features mentioned in the paper."
expected_reader_confusions:
  - "Thinking stochastic means random for no reason rather than sampled/minibatch estimates."
  - "Thinking Adam changes the model architecture rather than the parameter update rule."
  - "Treating AdaGrad/RMSProp mentions as prerequisites instead of motivating context."
section_specific_review_checks:
  - "Does not overclaim Adam's superiority."
  - "Explains first-order and stochastic objective plainly."
  - "Keeps related work high-level and defers mechanics."
completion_criteria:
  - "Reader can define gradient, stochastic gradient, and parameter update."
  - "Reader understands why the next section needs optimizer state."
user_review_gate:
  required: true
  instruction: "Stop after this section is authored/reviewed/fixed and wait for user approval before continuing."
