prerequisite_concepts:
  - qualitative chart reading
  - train loss vs generalization caveat
  - infinity norm, informally
depends_on_sections:
  - section_03_bias_correction
  - section_04_update_properties_and_related_work
  - section_05_theory_scope
authoring_order_notes: "Close the article by tying experiments and variants back to the mechanism, not by adding unsupported claims."
key_questions_to_answer:
  - "What experiment families did the paper test?"
  - "What do the figures support, and what do they not prove?"
  - "What changes in AdaMax?"
  - "How should a practitioner think about using Adam?"
core_mechanism:
  type: table
  why_this_mechanism: "A qualitative matrix can map each experiment to what it was meant to test without inventing numbers."
media_needed:
  - type: qualitative experiment matrix
    purpose: "Summarize paper experiments by setup, optimizer comparison, and caution."
  - type: practical workflow checklist
    purpose: "Bridge the paper to using Adam in a real training loop."
code_needed:
  required: false
  why: "This section can refer back to the toy Adam code; no new code is needed."
  artifact_type: optional summary of prior toy demo
toy_or_scaled_down_demo:
  description: "A qualitative matrix instead of reproducing paper-scale experiments."
  what_it_demonstrates: "Which claims are supported by each experiment family."
  what_it_omits: "Exact reproduction, hyperparameter sweeps, and plotted numeric values."
toy_to_real_bridge: "Connect the toy update loop to practical training choices: defaults as starting points, monitor validation behavior, and treat paper results as evidence from tested settings."
expected_reader_confusions:
  - "Reading training curves as universal proof of best optimizer."
  - "Missing that CIFAR-10 results are nuanced."
  - "Thinking AdaMax is a replacement that must always be used."
section_specific_review_checks:
  - "No invented chart values."
  - "Experiments are described with the paper's caveats."
  - "Includes recap, practical workflow, limitations, and next-up material."
completion_criteria:
  - "Reader can summarize the experiment evidence without overclaiming."
  - "Reader understands AdaMax and temporal averaging at the appropriate depth."
user_review_gate:
  required: true
  instruction: "Stop after this section is authored/reviewed/fixed and wait for user approval before continuing."
