<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">One-hot row selection and projection lookup</title>
  <desc id="desc">A one-hot vector for dog selects the dog row from an embedding matrix. Each output coordinate can be seen as a dot product between the one-hot vector and a matrix column.</desc>
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f8fafc; stroke: #d1d5db; stroke-width: 1.5; }
    .title { font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .label { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .small { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
    .tiny { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .cell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
    .hot { fill: #2563eb; stroke: #1d4ed8; }
    .selected { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
    .out { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    .arrow { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .green { stroke: #16a34a; }
    .caption { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="560"/>
  <text x="40" y="46" class="title">Projection layer = embedding lookup</text>
  <text x="40" y="75" class="small">The one-hot vector is mostly zeros. Multiplying by the matrix selects one trainable row.</text>

  <rect x="40" y="105" width="205" height="245" rx="10" class="panel"/>
  <text x="72" y="138" class="label">one-hot word vector</text>
  <text x="78" y="166" class="small">dog = [0, 1, 0, 0]</text>
  <g transform="translate(86,195)">
    <rect x="0" y="0" width="36" height="36" class="cell"/><text x="14" y="24" class="small">0</text><text x="-44" y="24" class="tiny">cat</text>
    <rect x="46" y="0" width="36" height="36" class="hot"/><text x="60" y="24" class="small" fill="#ffffff">1</text><text x="1" y="64" class="tiny">dog slot is on</text>
    <rect x="92" y="0" width="36" height="36" class="cell"/><text x="106" y="24" class="small">0</text>
    <rect x="138" y="0" width="36" height="36" class="cell"/><text x="152" y="24" class="small">0</text>
  </g>
  <text x="70" y="300" class="small">Zeros erase other rows.</text>
  <text x="70" y="324" class="small">The 1 keeps the dog row.</text>

  <rect x="315" y="105" width="350" height="300" rx="10" class="panel"/>
  <text x="382" y="138" class="label">trainable embedding matrix</text>
  <text x="385" y="165" class="small">V rows x D columns</text>
  <g transform="translate(370,195)">
    <text x="-62" y="24" class="tiny">cat</text>
    <rect x="0" y="0" width="70" height="34" class="cell"/><text x="20" y="23" class="small">0.7</text>
    <rect x="70" y="0" width="70" height="34" class="cell"/><text x="90" y="23" class="small">0.2</text>
    <rect x="140" y="0" width="70" height="34" class="cell"/><text x="154" y="23" class="small">-0.1</text>

    <text x="-62" y="66" class="tiny">dog</text>
    <rect x="0" y="42" width="70" height="34" class="selected"/><text x="20" y="65" class="small">0.6</text>
    <rect x="70" y="42" width="70" height="34" class="selected"/><text x="90" y="65" class="small">0.3</text>
    <rect x="140" y="42" width="70" height="34" class="selected"/><text x="154" y="65" class="small">-0.2</text>

    <text x="-62" y="108" class="tiny">car</text>
    <rect x="0" y="84" width="70" height="34" class="cell"/><text x="14" y="107" class="small">-0.4</text>
    <rect x="70" y="84" width="70" height="34" class="cell"/><text x="90" y="107" class="small">0.8</text>
    <rect x="140" y="84" width="70" height="34" class="cell"/><text x="160" y="107" class="small">0.5</text>

    <text x="-62" y="150" class="tiny">engine</text>
    <rect x="0" y="126" width="70" height="34" class="cell"/><text x="14" y="149" class="small">-0.5</text>
    <rect x="70" y="126" width="70" height="34" class="cell"/><text x="90" y="149" class="small">0.7</text>
    <rect x="140" y="126" width="70" height="34" class="cell"/><text x="160" y="149" class="small">0.6</text>
  </g>
  <text x="352" y="377" class="small">These row values change during training.</text>

  <rect x="735" y="140" width="180" height="145" rx="10" class="panel"/>
  <text x="764" y="174" class="label">projected vector</text>
  <g transform="translate(760,205)">
    <rect x="0" y="0" width="55" height="38" class="out"/><text x="14" y="25" class="small">0.6</text>
    <rect x="55" y="0" width="55" height="38" class="out"/><text x="70" y="25" class="small">0.3</text>
    <rect x="110" y="0" width="55" height="38" class="out"/><text x="122" y="25" class="small">-0.2</text>
  </g>
  <text x="764" y="268" class="small">This is the dog row.</text>

  <path d="M248 232 C280 232, 285 232, 315 232" class="arrow"/>
  <path d="M665 255 C700 244, 710 233, 735 224" class="arrow green"/>

  <rect x="70" y="425" width="820" height="74" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="95" y="456" class="label">Dot-product view of selection</text>
  <text x="95" y="482" class="small">First coordinate: [0, 1, 0, 0] dot [0.7, 0.6, -0.4, -0.5] = 0.6</text>
  <text x="95" y="506" class="caption">Caption: One-hot lookup can be viewed as dot products that select a trainable row from the embedding matrix.</text>
</svg>
