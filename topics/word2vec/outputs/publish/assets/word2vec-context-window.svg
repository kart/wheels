<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Context window around a center word</title>
  <desc id="desc">A sentence strip showing a center word and two context words on each side, which become training examples for CBOW and Skip-gram.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2f80ed"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #1f2933; }
      .title { font-size: 26px; font-weight: 700; }
      .label { font-size: 16px; font-weight: 650; }
      .small { font-size: 14px; fill: #4b5563; }
      .token { fill: #ffffff; stroke: #c7cdd4; stroke-width: 1.5; }
      .context { fill: #e8f2ff; stroke: #2f80ed; }
      .center { fill: #fff3df; stroke: #ef7d32; stroke-width: 2; }
      .bracket { stroke: #2f80ed; stroke-width: 3; fill: none; }
      .arrow { stroke: #2f80ed; stroke-width: 2; marker-end: url(#arrow); }
      .caption { font-size: 15px; fill: #374151; }
    </style>
  </defs>
  <rect width="960" height="420" fill="#f7f9fc"/>
  <text x="40" y="48" class="title">A context window creates training examples</text>
  <text x="40" y="78" class="small">Example sentence: the quick brown fox jumps over the lazy dog</text>

  <g transform="translate(70 135)">
    <rect x="0" y="0" width="78" height="52" rx="8" class="token"/><text x="25" y="32" class="label">the</text>
    <rect x="92" y="0" width="88" height="52" rx="8" class="context"/><text x="112" y="32" class="label">quick</text>
    <rect x="194" y="0" width="92" height="52" rx="8" class="context"/><text x="215" y="32" class="label">brown</text>
    <rect x="300" y="0" width="82" height="52" rx="8" class="center"/><text x="325" y="32" class="label">fox</text>
    <rect x="396" y="0" width="92" height="52" rx="8" class="context"/><text x="417" y="32" class="label">jumps</text>
    <rect x="502" y="0" width="82" height="52" rx="8" class="context"/><text x="526" y="32" class="label">over</text>
    <rect x="598" y="0" width="72" height="52" rx="8" class="token"/><text x="623" y="32" class="label">the</text>
    <rect x="684" y="0" width="78" height="52" rx="8" class="token"/><text x="707" y="32" class="label">lazy</text>
    <rect x="776" y="0" width="74" height="52" rx="8" class="token"/><text x="801" y="32" class="label">dog</text>
  </g>

  <path d="M162 220 L162 242 L654 242 L654 220" class="bracket"/>
  <text x="305" y="274" class="label">window size 2 around center word</text>
  <line x1="365" y1="205" x2="365" y2="250" class="arrow"/>
  <text x="328" y="315" class="small">center word</text>
  <text x="186" y="120" class="small">context before</text>
  <text x="466" y="120" class="small">context after</text>
  <text x="40" y="374" class="caption">Caption: A context window turns ordinary text into training examples: one center word and nearby context words.</text>
</svg>
