<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Skip-gram predicts surrounding words from the current word</title>
  <desc id="desc">A Skip-gram architecture diagram showing the current word flowing through projection to predict surrounding context words.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #1f2933; }
      .title { font-size: 26px; font-weight: 700; }
      .label { font-size: 17px; font-weight: 650; }
      .small { font-size: 14px; fill: #4b5563; }
      .input { fill: #fff3df; stroke: #ef7d32; stroke-width: 2; }
      .projection { fill: #eef8ee; stroke: #238636; stroke-width: 1.5; }
      .output { fill: #e8f2ff; stroke: #2563eb; stroke-width: 1.5; }
      .arrow { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .caption { font-size: 15px; fill: #374151; }
    </style>
  </defs>
  <rect width="960" height="520" fill="#f7f9fc"/>
  <text x="40" y="46" class="title">Skip-gram: current word -> surrounding words</text>
  <text x="40" y="76" class="small">Redrawn from the paper's Figure 1 direction: Skip-gram predicts surrounding words given the current word.</text>

  <text x="104" y="124" class="label">Input</text>
  <text x="406" y="124" class="label">Projection</text>
  <text x="722" y="124" class="label">Predicted context</text>

  <rect x="75" y="235" width="145" height="62" rx="10" class="input"/>
  <text x="122" y="273" class="label">w(t)</text>
  <text x="89" y="322" class="small">current word</text>

  <rect x="380" y="215" width="185" height="102" rx="10" class="projection"/>
  <text x="410" y="253" class="label">lookup current</text>
  <text x="419" y="282" class="label">word vector</text>
  <text x="392" y="309" class="small">used for several predictions</text>

  <rect x="720" y="155" width="130" height="46" rx="8" class="output"/><text x="760" y="184" class="label">w(t-2)</text>
  <rect x="720" y="215" width="130" height="46" rx="8" class="output"/><text x="760" y="244" class="label">w(t-1)</text>
  <rect x="720" y="275" width="130" height="46" rx="8" class="output"/><text x="760" y="304" class="label">w(t+1)</text>
  <rect x="720" y="335" width="130" height="46" rx="8" class="output"/><text x="760" y="364" class="label">w(t+2)</text>

  <path d="M220 266 L380 266" class="arrow"/>
  <path d="M565 240 C620 210, 660 182, 720 178" class="arrow"/>
  <path d="M565 258 C630 246, 665 240, 720 238" class="arrow"/>
  <path d="M565 278 C630 290, 665 298, 720 298" class="arrow"/>
  <path d="M565 300 C620 335, 660 355, 720 358" class="arrow"/>

  <text x="40" y="458" class="caption">Caption: Skip-gram uses one current word to predict several surrounding words. Direction must not be reversed.</text>
</svg>
