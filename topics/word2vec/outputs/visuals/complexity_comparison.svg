<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Qualitative model complexity comparison</title>
  <desc id="desc">A qualitative chart showing where the paper says major computational cost appears in NNLM, RNNLM, CBOW, and Skip-gram.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #1f2933; }
      .title { font-size: 26px; font-weight: 700; }
      .label { font-size: 16px; font-weight: 650; }
      .small { font-size: 14px; fill: #4b5563; }
      .axis { stroke: #94a3b8; stroke-width: 1.5; }
      .bar1 { fill: #8ab4f8; }
      .bar2 { fill: #f6b26b; }
      .bar3 { fill: #93c47d; }
      .bar4 { fill: #b4a7d6; }
      .note { fill: #ffffff; stroke: #c7cdd4; stroke-width: 1.5; }
      .caption { font-size: 15px; fill: #374151; }
    </style>
  </defs>
  <rect width="960" height="520" fill="#f7f9fc"/>
  <text x="40" y="46" class="title">Where the paper says training cost comes from</text>
  <text x="40" y="76" class="small">Qualitative chart. Bar lengths are explanatory, not exact measured values.</text>

  <line x1="210" y1="400" x2="850" y2="400" class="axis"/>
  <line x1="210" y1="125" x2="210" y2="400" class="axis"/>
  <text x="750" y="430" class="small">more per-example work</text>

  <text x="84" y="156" class="label">NNLM</text>
  <rect x="210" y="135" width="455" height="34" class="bar1"/><text x="680" y="158" class="small">hidden layer + vocabulary output</text>

  <text x="82" y="222" class="label">RNNLM</text>
  <rect x="210" y="201" width="400" height="34" class="bar2"/><text x="625" y="224" class="small">recurrent hidden state + output</text>

  <text x="91" y="288" class="label">CBOW</text>
  <rect x="210" y="267" width="210" height="34" class="bar3"/><text x="435" y="290" class="small">no non-linear hidden layer</text>

  <text x="54" y="354" class="label">Skip-gram</text>
  <rect x="210" y="333" width="280" height="34" class="bar4"/><text x="505" y="356" class="small">multiple context predictions</text>

  <rect x="545" y="250" width="330" height="95" rx="8" class="note"/>
  <text x="565" y="282" class="label">Paper-grounded point</text>
  <text x="565" y="310" class="small">Removing the non-linear hidden layer</text>
  <text x="565" y="332" class="small">helps CBOW and Skip-gram scale.</text>

  <text x="40" y="478" class="caption">Caption: Qualitative comparison of the paper's efficiency story; this is not an exact numeric chart.</text>
</svg>
