<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">Analogy evaluation pipeline</title>
  <desc id="desc">A flowchart showing how an analogy question becomes a vector expression, nearest-neighbor search, and exact-match score.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #1f2933; }
      .title { font-size: 26px; font-weight: 700; }
      .label { font-size: 16px; font-weight: 650; }
      .small { font-size: 14px; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #c7cdd4; stroke-width: 1.5; }
      .accent { fill: #e8f2ff; stroke: #2563eb; stroke-width: 1.5; }
      .strict { fill: #fff3df; stroke: #ef7d32; stroke-width: 1.8; }
      .arrow { stroke: #2563eb; stroke-width: 2.3; marker-end: url(#arrow); }
      .caption { font-size: 15px; fill: #374151; }
    </style>
  </defs>
  <rect width="960" height="460" fill="#f7f9fc"/>
  <text x="40" y="46" class="title">From analogy question to exact-match score</text>
  <text x="40" y="76" class="small">Grounded in the paper's semantic-syntactic relationship evaluation.</text>

  <rect x="55" y="145" width="185" height="105" rx="10" class="accent"/>
  <text x="82" y="176" class="label">1. Question</text>
  <text x="78" y="205" class="small">big : biggest</text>
  <text x="78" y="228" class="small">small : ?</text>

  <rect x="286" y="145" width="210" height="105" rx="10" class="box"/>
  <text x="318" y="176" class="label">2. Vector expression</text>
  <text x="314" y="205" class="small">biggest - big</text>
  <text x="314" y="228" class="small">+ small</text>

  <rect x="542" y="145" width="175" height="105" rx="10" class="box"/>
  <text x="570" y="176" class="label">3. Search</text>
  <text x="566" y="205" class="small">nearest vector</text>
  <text x="566" y="228" class="small">by cosine distance</text>

  <rect x="763" y="145" width="145" height="105" rx="10" class="strict"/>
  <text x="792" y="176" class="label">4. Score</text>
  <text x="785" y="205" class="small">exact answer?</text>
  <text x="792" y="228" class="small">smallest</text>

  <line x1="240" y1="198" x2="286" y2="198" class="arrow"/>
  <line x1="496" y1="198" x2="542" y2="198" class="arrow"/>
  <line x1="717" y1="198" x2="763" y2="198" class="arrow"/>

  <rect x="210" y="305" width="540" height="70" rx="8" class="box"/>
  <text x="238" y="336" class="label">Strict metric</text>
  <text x="238" y="360" class="small">The paper counts a question correct only if the nearest word exactly matches the expected answer; synonyms count as mistakes.</text>

  <text x="40" y="424" class="caption">Caption: Evaluation pipeline: analogy question, vector expression, nearest-neighbor search, exact-match score.</text>
</svg>
